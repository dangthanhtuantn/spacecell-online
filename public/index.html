<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SpaceCell v3</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;overflow:hidden;font-family:'Courier New',monospace;user-select:none;cursor:none;}
canvas{display:block;}
/* ── Lobby ── */
#lobby{position:fixed;inset:0;background:radial-gradient(ellipse at center,#001428 0%,#000208 70%);display:flex;align-items:center;justify-content:center;z-index:200;cursor:default;}
.lbox{background:rgba(0,18,45,0.97);border:1px solid rgba(0,180,255,0.4);border-radius:16px;padding:28px 36px;width:540px;max-height:90vh;overflow-y:auto;}
.lbox h1{color:#0cf;font-size:24px;letter-spacing:5px;text-align:center;margin-bottom:4px;}
.lbox .sub{color:rgba(0,180,255,0.4);font-size:10px;letter-spacing:3px;text-align:center;margin-bottom:22px;}
.lbox label{display:block;color:#7dd8f0;font-size:11px;letter-spacing:2px;margin-bottom:6px;font-weight:bold;}
.lbox input[type=text]{width:100%;background:rgba(0,25,60,0.8);border:1px solid rgba(0,180,255,0.3);border-radius:6px;color:#fff;font-family:inherit;font-size:14px;padding:8px 12px;margin-bottom:18px;outline:none;}
.lbox input:focus{border-color:#0cf;}
.lsec{margin-bottom:18px;}
.tabs{display:flex;margin-bottom:10px;border-bottom:1px solid rgba(0,180,255,0.2);}
.tab{flex:1;padding:7px;text-align:center;font-size:11px;letter-spacing:1px;color:#6ab8d4;cursor:pointer;font-weight:bold;}
.tab.on{color:#0cf;border-bottom:2px solid #0cf;}
.colors{display:flex;gap:8px;flex-wrap:wrap;}
.csw{width:28px;height:28px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:transform .15s;}
.csw:hover,.csw.sel{transform:scale(1.3);border-color:#fff;}
.fgrid{display:grid;grid-template-columns:repeat(8,1fr);gap:4px;max-height:220px;overflow-y:auto;padding:2px;}
.flag{font-size:22px;text-align:center;padding:3px 2px;border-radius:4px;cursor:pointer;border:2px solid transparent;line-height:1.2;color:#fff;}
.flag:hover,.flag.sel{border-color:#0cf;background:rgba(0,180,255,0.12);}
.playbtn{width:100%;background:rgba(0,180,255,0.15);border:1px solid rgba(0,180,255,0.6);color:#0cf;font-family:inherit;font-size:13px;letter-spacing:3px;padding:11px;border-radius:8px;cursor:pointer;margin-top:6px;}
.playbtn:hover{background:rgba(0,180,255,0.3);}
/* ── HUD ── */
#hud{position:fixed;top:10px;left:10px;pointer-events:none;display:flex;flex-direction:column;gap:5px;}
.hb{background:rgba(0,10,28,0.9);border:1px solid rgba(0,180,255,0.25);border-radius:8px;padding:6px 12px;min-width:145px;}
.hl{color:rgba(0,180,255,0.55);font-size:9px;letter-spacing:2px;margin-bottom:1px;}
.hv{font-size:15px;font-weight:bold;color:#fff;}
#lb{position:fixed;top:10px;right:10px;background:rgba(0,10,28,0.9);border:1px solid rgba(0,180,255,0.25);border-radius:8px;padding:7px 12px;pointer-events:none;min-width:140px;}
#lb h4{color:rgba(0,180,255,0.55);font-size:9px;letter-spacing:2px;margin-bottom:4px;}
.le{font-size:11px;color:#bbb;padding:1px 0;}
.le.me{color:#0ff;font-weight:bold;}
/* ── Skill bar ── */
#inv{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);display:flex;gap:6px;pointer-events:none;}
.sk{background:rgba(0,10,28,0.93);border:1px solid rgba(0,180,255,0.32);border-radius:8px;padding:5px 9px;text-align:center;min-width:52px;}
.sk .k{font-size:12px;font-weight:bold;color:#0ff;}
.sk .n{color:#444;font-size:8px;letter-spacing:1px;margin-top:1px;}
.sk .cnt{color:#ff0;font-size:11px;font-weight:bold;min-height:14px;}
.sk .cd{color:#f80;font-size:9px;min-height:11px;}
.sk.act{border-color:#0ff;background:rgba(0,40,65,0.9);}
.sk.emp .k{color:rgba(0,180,255,0.2);}
.sk.fire{border-color:#f80;background:rgba(40,18,0,0.9);}
/* ── Minimap ── */
#mmw{position:fixed;bottom:14px;right:14px;pointer-events:none;}
#mmw .mml{color:rgba(0,180,255,0.45);font-size:9px;letter-spacing:1px;text-align:center;margin-bottom:3px;}
#mm{border:1px solid rgba(0,180,255,0.35);border-radius:6px;display:block;}
/* ── Messages/Death ── */
#msgs{position:fixed;top:10px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;gap:3px;pointer-events:none;align-items:center;z-index:50;}
.msg{background:rgba(0,10,28,0.93);border-left:3px solid #0cf;padding:3px 12px;font-size:11px;color:#ccc;border-radius:0 4px 4px 0;transition:opacity .5s;white-space:nowrap;}
#dead{position:fixed;inset:0;background:rgba(0,0,0,0.82);display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:99;cursor:default;}
#dead h2{color:#f44;font-size:28px;letter-spacing:4px;}
#dead p{color:#aaa;font-size:13px;}
#dead button{background:rgba(0,180,255,0.2);border:1px solid rgba(0,180,255,0.6);color:#0cf;font-family:inherit;font-size:13px;padding:10px 26px;border-radius:6px;cursor:pointer;letter-spacing:2px;}
</style>
</head>
<body>
<canvas id="gc"></canvas>
<div id="mmw"><div class="mml">MINIMAP</div><canvas id="mm" width="130" height="130"></canvas></div>
<div id="hud">
  <div class="hb"><div class="hl">MASS</div><div class="hv" id="hm">-</div></div>
  <div class="hb"><div class="hl">SPEED</div><div class="hv" id="hs">-</div></div>
  <div class="hb"><div class="hl">RANK</div><div class="hv" id="hr">-</div></div>
</div>
<div id="lb"><h4>LEADERBOARD</h4><div id="lbr"></div></div>
<div id="inv">
  <div class="sk" id="skQ"><div class="k">Q</div><div class="n">DASH</div><div class="cnt" id="cntQ">0</div><div class="cd" id="cdQ"></div></div>
  <div class="sk" id="skW"><div class="k">W</div><div class="n">SHIELD</div><div class="cnt" id="cntW">0</div><div class="cd" id="cdW"></div></div>
  <div class="sk" id="skE"><div class="k">E</div><div class="n">SHOOT</div><div class="cnt" id="cntE">hold</div><div class="cd" id="cdE"></div></div>
  <div class="sk" id="skR"><div class="k">R</div><div class="n">STEALTH</div><div class="cnt" id="cntR">0</div><div class="cd" id="cdR"></div></div>
  <div class="sk" id="skB"><div class="k">B</div><div class="n">BOMB</div><div class="cnt" id="cntB">0</div><div class="cd" id="cdB"></div></div>
  <div class="sk" id="skF"><div class="k">F</div><div class="n">MAGNET</div><div class="cnt" id="cntF">0</div><div class="cd" id="cdF"></div></div>
</div>
<div id="msgs"></div>
<div id="dead"><h2>ELIMINATED</h2><p id="dm"></p><button onclick="openLobby()">RESPAWN</button></div>

<!-- LOBBY -->
<div id="lobby">
  <div class="lbox">
    <h1>SPACECELL</h1>
    <div class="sub">UNIVERSE · ONLINE</div>
    <label>YOUR NAME</label>
    <input type="text" id="pname" maxlength="16" placeholder="Enter name..." value="Player">
    <div class="lsec">
      <label>APPEARANCE</label>
      <div class="tabs">
        <div class="tab on" id="tab0" onclick="switchTab(0)">COLOR</div>
        <div class="tab" id="tab1" onclick="switchTab(1)">FLAG</div>
      </div>
      <div id="panel0"><div class="colors" id="colorGrid"></div></div>
      <div id="panel1" style="display:none"><div class="fgrid" id="flagGrid"></div></div>
    </div>
    <button class="playbtn" onclick="startFromLobby()">▶ &nbsp;PLAY NOW</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
// LOBBY
// ═══════════════════════════════════════════════════════════
const PCOLORS=['#00cfff','#ff4455','#ffaa00','#44ff88','#ff44ff','#ffff44','#ff8800','#00ffcc','#ff88cc','#88ff44','#4488ff','#ff6644','#44ccff','#ffcc44','#cc44ff','#44ff44'];
const ALL_FLAGS=[
  '🇦🇩','🇦🇪','🇦🇫','🇦🇬','🇦🇱','🇦🇲','🇦🇴','🇦🇷','🇦🇹','🇦🇺','🇦🇿','🇧🇦',
  '🇧🇧','🇧🇩','🇧🇪','🇧🇫','🇧🇬','🇧🇭','🇧🇮','🇧🇯','🇧🇳','🇧🇴','🇧🇷','🇧🇸',
  '🇧🇹','🇧🇼','🇧🇾','🇧🇿','🇨🇦','🇨🇩','🇨🇫','🇨🇬','🇨🇭','🇨🇱','🇨🇲','🇨🇳',
  '🇨🇴','🇨🇷','🇨🇺','🇨🇻','🇨🇾','🇨🇿','🇩🇪','🇩🇯','🇩🇰','🇩🇲','🇩🇴','🇩🇿',
  '🇪🇨','🇪🇪','🇪🇬','🇪🇷','🇪🇸','🇪🇹','🇫🇮','🇫🇯','🇫🇲','🇫🇷','🇬🇦','🇬🇧',
  '🇬🇩','🇬🇪','🇬🇭','🇬🇲','🇬🇳','🇬🇶','🇬🇷','🇬🇹','🇬🇼','🇬🇾','🇭🇳','🇭🇷',
  '🇭🇹','🇭🇺','🇮🇩','🇮🇪','🇮🇱','🇮🇳','🇮🇶','🇮🇷','🇮🇸','🇮🇹','🇯🇲','🇯🇴',
  '🇯🇵','🇰🇪','🇰🇬','🇰🇭','🇰🇮','🇰🇲','🇰🇳','🇰🇵','🇰🇷','🇰🇼','🇰🇿','🇱🇦',
  '🇱🇧','🇱🇨','🇱🇮','🇱🇰','🇱🇷','🇱🇸','🇱🇹','🇱🇺','🇱🇻','🇱🇾','🇲🇦','🇲🇨',
  '🇲🇩','🇲🇪','🇲🇬','🇲🇭','🇲🇰','🇲🇱','🇲🇲','🇲🇳','🇲🇴','🇲🇷','🇲🇹','🇲🇺',
  '🇲🇻','🇲🇼','🇲🇽','🇲🇾','🇲🇿','🇳🇦','🇳🇪','🇳🇬','🇳🇮','🇳🇱','🇳🇴','🇳🇵',
  '🇳🇷','🇳🇿','🇴🇲','🇵🇦','🇵🇪','🇵🇬','🇵🇭','🇵🇰','🇵🇱','🇵🇸','🇵🇹','🇵🇼',
  '🇵🇾','🇶🇦','🇷🇴','🇷🇸','🇷🇺','🇷🇼','🇸🇦','🇸🇧','🇸🇩','🇸🇪','🇸🇬','🇸🇮',
  '🇸🇰','🇸🇱','🇸🇲','🇸🇳','🇸🇴','🇸🇷','🇸🇸','🇸🇹','🇸🇻','🇸🇾','🇸🇿','🇹🇩',
  '🇹🇬','🇹🇭','🇹🇯','🇹🇱','🇹🇲','🇹🇳','🇹🇴','🇹🇹','🇹🇻','🇹🇼','🇹🇿','🇺🇦',
  '🇺🇬','🇺🇸','🇺🇾','🇺🇿','🇻🇦','🇻🇨','🇻🇪','🇻🇳','🇻🇺','🇼🇸','🇽🇰','🇾🇪',
  '🇿🇦','🇿🇲','🇿🇼',
];

let selColor=PCOLORS[0],selFlag=null,useFlag=false;

function buildLobby(){
  const cg=document.getElementById('colorGrid');
  PCOLORS.forEach((c,i)=>{
    const d=document.createElement('div');d.className='csw'+(i===0?' sel':'');d.style.background=c;
    d.onclick=()=>{selColor=c;selFlag=null;useFlag=false;document.querySelectorAll('.csw').forEach(x=>x.classList.remove('sel'));d.classList.add('sel');};
    cg.appendChild(d);
  });
  const fg=document.getElementById('flagGrid');
  ALL_FLAGS.forEach(f=>{
    const d=document.createElement('div');d.className='flag';d.textContent=f;
    d.onclick=()=>{selFlag=f;useFlag=true;document.querySelectorAll('.flag').forEach(x=>x.classList.remove('sel'));d.classList.add('sel');};
    fg.appendChild(d);
  });
}
function switchTab(i){
  document.getElementById('panel0').style.display=i===0?'':'none';
  document.getElementById('panel1').style.display=i===1?'':'none';
  document.getElementById('tab0').className='tab'+(i===0?' on':'');
  document.getElementById('tab1').className='tab'+(i===1?' on':'');
}
function openLobby(){document.getElementById('dead').style.display='none';document.getElementById('lobby').style.display='flex';}
function startFromLobby(){
  const name=document.getElementById('pname').value.trim()||'Player';
  document.getElementById('lobby').style.display='none';
  startGame(name,useFlag?selFlag:null,selColor);
}
buildLobby();
document.getElementById('pname').addEventListener('keydown',e=>{if(e.key==='Enter')startFromLobby();});

// ═══════════════════════════════════════════════════════════
// ENGINE
// ═══════════════════════════════════════════════════════════
const GC=document.getElementById('gc');
const CTX=GC.getContext('2d');
const MMC=document.getElementById('mm');
const MCTX=MMC.getContext('2d');
let SW,SH;
function resize(){SW=GC.width=window.innerWidth;SH=GC.height=window.innerHeight;}
resize();window.addEventListener('resize',resize);

const Mouse={x:0,y:0};
const Keys={};
window.addEventListener('mousemove',e=>{Mouse.x=e.clientX;Mouse.y=e.clientY;});
window.addEventListener('keydown',e=>{
  if(Keys[e.code])return;Keys[e.code]=true;
  if(e.code==='Space')e.preventDefault();
  if(!gameRunning)return;
  if(e.code==='KeyQ')useQ();
  if(e.code==='KeyW')useW();
  if(e.code==='KeyR')useR();
  if(e.code==='KeyB')useB();
  if(e.code==='KeyF')useF();
});
window.addEventListener('keyup',e=>{Keys[e.code]=false;});

// ── World constants ──────────────────────────────────────────
// Reduced map: 10000x10000 (was 100000x100000, /10)
const CELL=1000, GRID=10;
const GW=CELL*GRID, GH=CELL*GRID; // 10000 x 10000

// Food distribution: 5(50%), 10(25%), 20(15%), 50(5%), 100(5%)
const FOOD_TABLE=[
  {mass:5,  r:3, weight:50},
  {mass:10, r:4, weight:25},
  {mass:20, r:5, weight:15},
  {mass:50, r:7, weight:5},
  {mass:100,r:10,weight:5},
];
const FOOD_TOTAL_WEIGHT=100;
const FOOD_COUNT=5000; // increased density

// Item counts: x10 vs before (was 10, now 100)
const ITEM_MAX=100;

// Speed brackets: -10% per threshold crossed (500,1000,2000,5000,10000)
// <500=100%, 500-999=90%, 1000-1999=81%, 2000-4999=72.9%, 5000-9999=65.6%, >=10000=59%
function speedMult(mass){
  if(mass>=10000) return Math.pow(0.9,5);
  if(mass>=5000)  return Math.pow(0.9,4);
  if(mass>=2000)  return Math.pow(0.9,3);
  if(mass>=1000)  return Math.pow(0.9,2);
  if(mass>=500)   return Math.pow(0.9,1);
  return 1;
}
function baseSpd(mass){return 5*speedMult(mass);}

const rnd=(a,b)=>Math.random()*(b-a)+a;
const dst=(a,b)=>Math.hypot(a.x-b.x,a.y-b.y);
const mtr=m=>Math.sqrt(m)*1.5+3;
const clamp=(v,a,b)=>v<a?a:v>b?b:v;

// Generate food by weighted distribution
function mkFood(){
  const roll=Math.random()*FOOD_TOTAL_WEIGHT;
  let acc=0;
  for(const ft of FOOD_TABLE){acc+=ft.weight;if(roll<acc)return {x:rnd(30,GW-30),y:rnd(30,GH-30),mass:ft.mass,r:ft.r,col:`hsl(${0|rnd(0,360)},80%,65%)`};}
  const ft=FOOD_TABLE[0];
  return{x:rnd(30,GW-30),y:rnd(30,GH-30),mass:ft.mass,r:ft.r,col:`hsl(${0|rnd(0,360)},80%,65%)`};
}

const STARS=Array.from({length:800},()=>({x:rnd(0,GW),y:rnd(0,GH),s:rnd(0.3,1.8),b:rnd(0.2,0.9)}));

const ITEM_DEFS={
  DASH:   {col:'#0cf',label:'DASH',   pickup:true},
  SHIELD: {col:'#88f',label:'SHIELD', pickup:true},
  STEALTH:{col:'#ccc',label:'STEALTH',pickup:true},
  GROW1:  {col:'#4f4',label:'GROWx1', pickup:true},
  GROW2:  {col:'#2d2',label:'GROWx2', pickup:true},
  GROW5:  {col:'#1a1',label:'GROWx5', pickup:true},
  MAGNET: {col:'#f0f',label:'MAGNET', pickup:true},
  TOXIC:  {col:'#8f0',label:'TOXIC',  pickup:false},
  BOMB:   {col:'#f80',label:'BOMB',   pickup:true},
};

const BNAMES=['Orion','Lyra','Nebula','Vega','Pulsar','Quasar','Sirius','Nova','Titan','Andromeda','Zeta','Rigel','Spica','Altair','Deneb'];
const BCOLS= ['#f55','#f90','#ff4','#4f4','#4cf','#f4f','#fa4','#5fa','#f5a','#af5','#5af','#ff8','#f64','#6f4','#46f'];

// ── State ────────────────────────────────────────────────────
let gameRunning=false;
let P=null,bots=[],food=[],items=[],bullets=[],parts=[];
let camX=0,camY=0,isDead=false,lastShot=0;
let cdQ=0,cdW=0,cdR=0,cdB=0,cdF=0;
let dashEnd=0,shieldEnd=0,stealthEnd=0;
let invDash=0,invShield=0,invStealth=0,invBomb=0,invMagnet=0;
let pName='Player',pFlag=null,pColor='#00cfff';

function addMsg(t,col){
  const d=document.getElementById('msgs');
  const el=document.createElement('div');el.className='msg';
  if(col)el.style.borderLeftColor=col;
  el.textContent=t;d.appendChild(el);
  if(d.children.length>5)d.removeChild(d.children[0]);
  setTimeout(()=>{el.style.opacity='0';setTimeout(()=>el.remove(),500);},2500);
}

function spark(px,py,col,n=8){
  for(let i=0;i<n;i++){
    const a=rnd(0,Math.PI*2),s=rnd(1,5);
    parts.push({x:px,y:py,vx:Math.cos(a)*s,vy:Math.sin(a)*s,r:rnd(2,4),col,life:rnd(15,30)});
  }
}

// Big explosion effect when unit is killed
function explode(px,py,col){
  for(let i=0;i<40;i++){
    const a=rnd(0,Math.PI*2),s=rnd(2,12);
    parts.push({x:px,y:py,vx:Math.cos(a)*s,vy:Math.sin(a)*s,r:rnd(3,8),col,life:rnd(25,55)});
  }
  // Ring of white sparks
  for(let i=0;i<20;i++){
    const a=(i/20)*Math.PI*2,s=rnd(6,14);
    parts.push({x:px,y:py,vx:Math.cos(a)*s,vy:Math.sin(a)*s,r:rnd(2,5),col:'#fff',life:rnd(15,35)});
  }
}

function countItem(t){return items.filter(x=>x.type===t).length;}
function spawnItem(t){
  if(countItem(t)>=ITEM_MAX)return;
  const d=ITEM_DEFS[t];
  items.push({x:rnd(100,GW-100),y:rnd(100,GH-100),type:t,r:14,age:0,col:d.col,label:d.label,pickup:d.pickup});
}
function schedRespawn(t){setTimeout(()=>{if(gameRunning)spawnItem(t);},15000);}

function initItems(){
  items=[];
  Object.keys(ITEM_DEFS).forEach(t=>{for(let i=0;i<ITEM_MAX;i++)spawnItem(t);});
}

function mkBot(i){
  return{x:rnd(500,GW-500),y:rnd(500,GH-500),mass:rnd(15,80),vx:0,vy:0,
    col:BCOLS[i%15],name:BNAMES[i%15]+(i>=15?'_'+(i/15|0):''),
    atx:rnd(0,GW),aty:rnd(0,GH),at:0,st:0};
}

// ── Start ────────────────────────────────────────────────────
function startGame(name,flag,color){
  pName=name||'Player';pFlag=flag||null;pColor=color||'#00cfff';
  isDead=false;gameRunning=true;
  document.getElementById('dead').style.display='none';
  resize();
  P={x:GW/2,y:GH/2,mass:10,vx:0,vy:0};
  camX=P.x-SW/2;camY=P.y-SH/2;
  Mouse.x=SW/2;Mouse.y=SH/2;
  bots=Array.from({length:100},(_,i)=>mkBot(i));
  food=Array.from({length:FOOD_COUNT},mkFood);
  parts=[];bullets=[];
  cdQ=cdW=cdR=cdB=cdF=0;
  dashEnd=shieldEnd=stealthEnd=0;
  invDash=invShield=invStealth=invBomb=invMagnet=0;
  lastShot=0;
  initItems();
  addMsg('Welcome '+pName+'!','#0ff');
  addMsg('Q Dash  W Shield  E Shoot  R Stealth  B Bomb  F Magnet','#0cf');
}

// ── Skills ───────────────────────────────────────────────────
function useQ(){
  if(invDash<=0){addMsg('No DASH!','#f80');return;}
  if(cdQ>0)return;
  invDash--;cdQ=2000;
  const mdx=Mouse.x-SW/2, mdy=Mouse.y-SH/2;
  const ml=Math.hypot(mdx,mdy)||1;
  const nx=mdx/ml, ny=mdy/ml;
  // Fixed v0=40 with friction=0.82 over 12 frames → total ≈200px
  // sum(0.82^i, i=0..11) ≈ 5.04 → 40*5.04 ≈ 201px
  P.vx=nx*40;
  P.vy=ny*40;
  P._dashFrames=12;
  P._dashNx=nx; P._dashNy=ny;
  addMsg('DASH!','#0cf');
}
function useW(){if(invShield<=0){addMsg('No SHIELD!','#f80');return;}if(cdW>0)return;invShield--;shieldEnd=Date.now()+3000;cdW=3000;addMsg('SHIELD! 3s','#88f');}
function useR(){if(invStealth<=0){addMsg('No STEALTH!','#f80');return;}if(cdR>0)return;invStealth--;stealthEnd=Date.now()+3000;cdR=3000;addMsg('STEALTH! 3s','#ccc');}

function useB(){
  if(invBomb<=0){addMsg('No BOMB!','#f80');return;}if(cdB>0)return;
  invBomb--;cdB=1500;
  const wx=Mouse.x+camX, wy=Mouse.y+camY;
  const dx=wx-P.x, dy=wy-P.y, l=Math.hypot(dx,dy)||1;
  const nx=dx/l, ny=dy/l;
  const pr=mtr(P.mass);
  // Bomb speed=20, travels 300px → life = 300/20 = 15 frames
  bullets.push({x:P.x+nx*(pr+8),y:P.y+ny*(pr+8),vx:nx*20,vy:ny*20,type:'bomb',r:14,life:15,col:'#f80'});
  addMsg('BOMB!','#f80');
}

function useF(){
  if(invMagnet<=0){addMsg('No MAGNET!','#f80');return;}if(cdF>0)return;
  invMagnet--;cdF=1000;
  let n=0;
  const magnetRange=mtr(P.mass)+300;
  for(let i=food.length-1;i>=0;i--){
    if(dst(P,food[i])<magnetRange){
      P.mass=Math.min(10000,P.mass+food[i].mass);
      spark(food[i].x,food[i].y,food[i].col,2);
      food.splice(i,1);
      food.push(mkFood());
      n++;
    }
  }
  addMsg('MAGNET pulled '+n+' food!','#f0f');
}

function shoot(){
  if(!P||P.mass<=20)return;
  const now=Date.now();if(now-lastShot<100)return;lastShot=now;
  P.mass-=1;
  // FIX: world position of mouse = screen position + camera offset
  const wx=Mouse.x+camX;
  const wy=Mouse.y+camY;
  const dx=wx-P.x, dy=wy-P.y, l=Math.hypot(dx,dy)||1;
  const r=mtr(P.mass);
  bullets.push({
    x:P.x+dx/l*(r+8),
    y:P.y+dy/l*(r+8),
    vx:dx/l*20,
    vy:dy/l*20,
    type:'shot',r:3,life:25,col:'#0ff',owner:'p'
  });
}

// ── Loop ─────────────────────────────────────────────────────
let prev=0;
function loop(ts){
  requestAnimationFrame(loop);
  const dt=clamp((ts-prev)/16.67,0.1,3);prev=ts;
  if(gameRunning&&!isDead)update(dt);
  render();
}

function update(dt){
  if(!P)return;
  const now=Date.now();
  if(cdQ>0)cdQ=Math.max(0,cdQ-dt*16.67);
  if(cdW>0)cdW=Math.max(0,cdW-dt*16.67);
  if(cdR>0)cdR=Math.max(0,cdR-dt*16.67);
  if(cdB>0)cdB=Math.max(0,cdB-dt*16.67);
  if(cdF>0)cdF=Math.max(0,cdF-dt*16.67);

  const shielded=now<shieldEnd, stealthed=now<stealthEnd;
  if(Keys['KeyE'])shoot();

  // Player movement
  const spd=baseSpd(P.mass);
  if(P._dashFrames>0){
    // Dash active: pure friction deceleration, no mouse steering
    P._dashFrames--;
    P.vx*=0.82;
    P.vy*=0.82;
  } else {
    const mdx=Mouse.x-SW/2, mdy=Mouse.y-SH/2;
    const ml=Math.hypot(mdx,mdy)||1;
    P.vx+=(mdx/ml*spd-P.vx)*0.15;
    P.vy+=(mdy/ml*spd-P.vy)*0.15;
    P.vx*=0.85;P.vy*=0.85;
  }
  const pr=mtr(P.mass);
  P.x=clamp(P.x+P.vx*dt,pr,GW-pr);
  P.y=clamp(P.y+P.vy*dt,pr,GH-pr);

  // Camera follows player (camX/camY = top-left world coord of viewport)
  camX+=(P.x-SW/2-camX)*0.1;
  camY+=(P.y-SH/2-camY)*0.1;

  // Eat food
  for(let i=food.length-1;i>=0;i--){
    const f=food[i];
    if(P.mass>f.mass*1.1&&dst(P,f)<pr+f.r){
      P.mass=Math.min(10000,P.mass+f.mass);
      spark(f.x,f.y,f.col,2);
      food[i]=mkFood();
    }
  }

  // Pickup items (player only)
  for(let i=items.length-1;i>=0;i--){
    const it=items[i];if(!it.pickup)continue;
    if(dst(P,it)<pr+it.r){
      if(it.type==='DASH'){invDash++;addMsg('DASH +1 ('+invDash+')','#0cf');}
      else if(it.type==='SHIELD'){invShield++;addMsg('SHIELD +1 ('+invShield+')','#88f');}
      else if(it.type==='STEALTH'){invStealth++;addMsg('STEALTH +1 ('+invStealth+')','#ccc');}
      else if(it.type==='GROW1'){P.mass=Math.min(10000,P.mass+100);addMsg('GROW x1 +100!','#4f4');}
      else if(it.type==='GROW2'){P.mass=Math.min(10000,P.mass+200);addMsg('GROW x2 +200!','#2d2');}
      else if(it.type==='GROW5'){P.mass=Math.min(10000,P.mass+500);addMsg('GROW x5 +500!','#1a1');}
      else if(it.type==='MAGNET'){invMagnet++;addMsg('MAGNET +1 ('+invMagnet+')','#f0f');}
      else if(it.type==='BOMB'){invBomb++;addMsg('BOMB +1 ('+invBomb+')','#f80');}
      spark(it.x,it.y,'#fff',10);
      items.splice(i,1);
      schedRespawn(it.type);
    }
  }

  // TOXIC passive area — 100px range, shrinks 5% per second
  items.forEach(it=>{
    if(it.type!=='TOXIC')return;
    if(dst(P,it)<100)P.mass=Math.max(10,P.mass*(1-0.05*dt/60));
    bots.forEach(b=>{if(dst(b,it)<100)b.mass=Math.max(5,b.mass*(1-0.05*dt/60));});
  });

  // Bullets
  for(let i=bullets.length-1;i>=0;i--){
    const b=bullets[i];
    b.x+=b.vx*dt;b.y+=b.vy*dt;b.life-=dt;
    if(b.life<=0||b.x<0||b.x>GW||b.y<0||b.y>GH){bullets.splice(i,1);continue;}
    if(b.type==='bomb'){
      let hit=false;
      if(!shielded&&dst(b,P)<b.r+pr){P.mass=Math.max(10,P.mass*0.7);spark(b.x,b.y,'#f80',18);hit=true;}
      bots.forEach(bot=>{
        if(dst(b,bot)<b.r+mtr(bot.mass)){
          bot.mass*=0.7;
          if(bot.mass<20){explode(bot.x,bot.y,bot.col);bot.mass=rnd(20,60);bot.x=rnd(100,GW-100);bot.y=rnd(100,GH-100);bot.vx=0;bot.vy=0;}
          else spark(b.x,b.y,'#f80',10);
          hit=true;
        }
      });
      if(hit)bullets.splice(i,1);
    } else {
      if(b.owner==='p'){
        let hit=false;
        for(let j=0;j<bots.length;j++){
          const bot=bots[j];
          if(dst(b,bot)<b.r+mtr(bot.mass)){
            bot.mass-=5;
            if(bot.mass<20){explode(bot.x,bot.y,bot.col);bot.mass=rnd(20,60);bot.x=rnd(100,GW-100);bot.y=rnd(100,GH-100);bot.vx=0;bot.vy=0;addMsg('Eliminated '+bot.name+'!','#f80');}
            else spark(b.x,b.y,'#f80',4);
            hit=true;break;
          }
        }
        if(hit)bullets.splice(i,1);
      } else if(!shielded){
        if(dst(b,P)<b.r+pr){
          P.mass-=5;
          spark(b.x,b.y,'#f44',4);
          bullets.splice(i,1);
          if(P.mass<20){
            explode(P.x,P.y,pColor);
            document.getElementById('dm').textContent='Eliminated by bullets!';
            document.getElementById('dead').style.display='flex';isDead=true;gameRunning=false;
          }
        }
      }
    }
  }

  // Bots AI
  bots.forEach(bot=>{
    if(!bot)return;
    bot.at-=dt;bot.st-=dt;
    if(bot.at<=0){
      bot.at=rnd(20,60);
      let best=null,bs=-Infinity;
      let fleeX=0,fleeY=0,fleeing=false;

      // Flee from larger bots within 300px
      bots.forEach(b2=>{
        if(b2===bot)return;
        const d=dst(bot,b2);
        if(b2.mass>bot.mass*1.1&&d<300){
          fleeX+=(bot.x-b2.x)/d;fleeY+=(bot.y-b2.y)/d;fleeing=true;
        }
      });
      // Flee from larger player within 300px
      if(!stealthed){
        const dp=dst(bot,P);
        if(P.mass>bot.mass*1.1&&dp<300){
          fleeX+=(bot.x-P.x)/dp;fleeY+=(bot.y-P.y)/dp;fleeing=true;
        }
      }

      if(fleeing){
        // Run away from threat
        const fl=Math.hypot(fleeX,fleeY)||1;
        bot.atx=clamp(bot.x+fleeX/fl*400,100,GW-100);
        bot.aty=clamp(bot.y+fleeY/fl*400,100,GH-100);
      } else {
        // Normal AI: hunt food or weaker targets
        food.forEach(f=>{if(bot.mass>f.mass*1.1){const s=f.mass/(dst(bot,f)+1);if(s>bs){bs=s;best=f;}}});
        bots.forEach(b2=>{if(b2!==bot&&bot.mass>b2.mass*1.1){const s=400/(dst(bot,b2)+1);if(s>bs){bs=s;best=b2;}}});
        // Bot detects player within 500px
        if(!stealthed&&bot.mass>P.mass*1.1&&dst(bot,P)<500){const s=600/(dst(bot,P)+1);if(s>bs){bs=s;best=P;}}
        bot.atx=best?best.x:rnd(100,GW-100);
        bot.aty=best?best.y:rnd(100,GH-100);
      }
    }
    const bdx=bot.atx-bot.x,bdy=bot.aty-bot.y,bl=Math.hypot(bdx,bdy)||1;
    bot.vx+=(bdx/bl*baseSpd(bot.mass)-bot.vx)*0.12;
    bot.vy+=(bdy/bl*baseSpd(bot.mass)-bot.vy)*0.12;
    bot.vx*=0.85;bot.vy*=0.85;
    const br=mtr(bot.mass);
    bot.x=clamp(bot.x+bot.vx*dt,br,GW-br);
    bot.y=clamp(bot.y+bot.vy*dt,br,GH-br);

    // Bot dies if mass < 20 (shot to death)
    if(bot.mass<20){
      explode(bot.x,bot.y,bot.col);
      bot.mass=rnd(20,60);bot.x=rnd(100,GW-100);bot.y=rnd(100,GH-100);
      bot.vx=0;bot.vy=0;return;
    }

    for(let i=food.length-1;i>=0;i--){if(bot.mass>food[i].mass*1.1&&dst(bot,food[i])<br+food[i].r){bot.mass=Math.min(10000,bot.mass+food[i].mass);food[i]=mkFood();}}
    bots.forEach(b2=>{if(b2===bot)return;if(bot.mass>b2.mass*1.1&&dst(bot,b2)<br){bot.mass=Math.min(10000,bot.mass+b2.mass*0.7);spark(b2.x,b2.y,b2.col,8);b2.mass=rnd(10,50);b2.x=rnd(300,GW-300);b2.y=rnd(300,GH-300);}});
    if(!shielded&&bot.mass>P.mass*1.1&&dst(bot,P)<br){
      document.getElementById('dm').textContent='Absorbed by '+bot.name+'!';
      document.getElementById('dead').style.display='flex';isDead=true;gameRunning=false;return;
    }
    if(P.mass>bot.mass*1.1&&dst(P,bot)<pr){
      P.mass=Math.min(10000,P.mass+bot.mass*0.7);
      explode(bot.x,bot.y,bot.col);
      addMsg('Absorbed '+bot.name+'!','#0ff');
      // Immediate respawn at random location
      bot.mass=rnd(20,60);bot.x=rnd(100,GW-100);bot.y=rnd(100,GH-100);bot.vx=0;bot.vy=0;
    }
    // Bot shoots player within 500px
    if(!stealthed&&bot.st<=0&&dst(bot,P)<500&&bot.mass>20){
      bot.st=rnd(60,150);
      const dd=dst(bot,P);if(dd<1)return;
      const nx=(P.x-bot.x)/dd,ny=(P.y-bot.y)/dd;
      bullets.push({x:bot.x+nx*(br+8),y:bot.y+ny*(br+8),vx:nx*16,vy:ny*16,type:'shot',r:3,life:32,col:bot.col,owner:'b'});
      bot.mass=Math.max(5,bot.mass-1);
    }
  });

  // Particles
  for(let i=parts.length-1;i>=0;i--){
    const p=parts[i];p.x+=p.vx*dt;p.y+=p.vy*dt;p.vx*=0.92;p.vy*=0.92;p.life-=dt;p.r*=0.95;
    if(p.life<=0||p.r<0.3)parts.splice(i,1);
  }
  P.mass=clamp(P.mass,10,10000);
  updateHUD(now);
}

function updSk(key,count,cd,active,isFire){
  const box=document.getElementById('sk'+key);
  const cnt=document.getElementById('cnt'+key);
  const cde=document.getElementById('cd'+key);
  if(!box||!cnt||!cde)return;
  if(isFire){cnt.textContent=Keys['KeyE']?'firing':'hold';cde.textContent='';box.className='sk'+(Keys['KeyE']?' fire':'');return;}
  cnt.textContent=count>=0?count:'';
  cde.textContent=cd>0?(cd/1000).toFixed(1)+'s':'';
  box.className='sk'+(active?' act':count===0?' emp':'');
}

function updateHUD(now){
  document.getElementById('hm').textContent=Math.floor(P.mass)+' M';
  document.getElementById('hs').textContent=Math.round(speedMult(P.mass)*100)+'%';
  const masses=[P.mass,...bots.map(b=>b.mass)].sort((a,b)=>b-a);
  document.getElementById('hr').textContent='#'+(masses.findIndex(m=>m===P.mass)+1);
  updSk('Q',invDash,cdQ,false,false);
  updSk('W',invShield,cdW,now<shieldEnd,false);
  updSk('E',-1,0,false,true);
  updSk('R',invStealth,cdR,now<stealthEnd,false);
  updSk('B',invBomb,cdB,false,false);
  updSk('F',invMagnet,cdF,false,false);
  const all=[{n:pName,m:Math.floor(P.mass)},...bots.map(b=>({n:b.name,m:Math.floor(b.mass)}))].sort((a,b)=>b.m-a.m);
  document.getElementById('lbr').innerHTML=all.slice(0,8).map((e,i)=>`<div class="le${e.n===pName?' me':''}">${i+1}. ${e.n} ${e.m}</div>`).join('');
}

// ── Render ───────────────────────────────────────────────────
function render(){
  const now=Date.now();
  CTX.fillStyle='#000510';CTX.fillRect(0,0,SW,SH);
  const ng=CTX.createRadialGradient(SW/2,SH/2,0,SW/2,SH/2,Math.max(SW,SH));
  ng.addColorStop(0,'rgba(3,0,20,0.5)');ng.addColorStop(1,'rgba(0,0,4,0)');
  CTX.fillStyle=ng;CTX.fillRect(0,0,SW,SH);

  if(!gameRunning){renderMinimap();return;}

  CTX.save();
  // Camera transform: translate so world (camX, camY) appears at screen (0, 0)
  CTX.translate(-camX,-camY);

  // Stars
  CTX.fillStyle='#fff';
  STARS.forEach(s=>{
    if(s.x<camX-5||s.x>camX+SW+5||s.y<camY-5||s.y>camY+SH+5)return;
    CTX.globalAlpha=s.b;CTX.beginPath();CTX.arc(s.x,s.y,s.s,0,Math.PI*2);CTX.fill();
  });
  CTX.globalAlpha=1;

  // Grid
  CTX.strokeStyle='rgba(0,55,120,0.22)';CTX.lineWidth=1;
  const gx0=Math.floor(camX/CELL)*CELL,gy0=Math.floor(camY/CELL)*CELL;
  for(let gx=gx0;gx<camX+SW+CELL;gx+=CELL){CTX.beginPath();CTX.moveTo(gx,0);CTX.lineTo(gx,GH);CTX.stroke();}
  for(let gy=gy0;gy<camY+SH+CELL;gy+=CELL){CTX.beginPath();CTX.moveTo(0,gy);CTX.lineTo(GW,gy);CTX.stroke();}
  CTX.strokeStyle='rgba(0,160,255,0.7)';CTX.lineWidth=6;CTX.strokeRect(0,0,GW,GH);

  // Food
  food.forEach(f=>{
    if(f.x<camX-20||f.x>camX+SW+20||f.y<camY-20||f.y>camY+SH+20)return;
    CTX.fillStyle=f.col;CTX.beginPath();CTX.arc(f.x,f.y,f.r,0,Math.PI*2);CTX.fill();
  });

  // Items
  items.forEach(it=>{
    if(it.x<camX-50||it.x>camX+SW+50||it.y<camY-50||it.y>camY+SH+50)return;
    it.age++;
    const pulse=Math.sin(it.age*0.06)*0.28+0.72;
    CTX.globalAlpha=pulse*0.35;CTX.fillStyle=it.col;
    CTX.beginPath();CTX.arc(it.x,it.y,it.r+8,0,Math.PI*2);CTX.fill();
    CTX.globalAlpha=1;CTX.fillStyle=it.col;
    CTX.beginPath();CTX.arc(it.x,it.y,it.r,0,Math.PI*2);CTX.fill();
    // Label with dark background for readability
    const lbl=it.label;
    CTX.font='bold 9px monospace';CTX.textAlign='center';CTX.textBaseline='middle';
    const tw=CTX.measureText(lbl).width;
    CTX.fillStyle='rgba(0,0,0,0.72)';
    CTX.fillRect(it.x-tw/2-2,it.y-5,tw+4,10);
    CTX.fillStyle='#fff';
    CTX.fillText(lbl,it.x,it.y+1);
  });

  // Particles
  parts.forEach(p=>{CTX.globalAlpha=Math.min(1,p.life/20);CTX.fillStyle=p.col;CTX.beginPath();CTX.arc(p.x,p.y,p.r,0,Math.PI*2);CTX.fill();});
  CTX.globalAlpha=1;

  // Bullets
  bullets.forEach(b=>{
    CTX.fillStyle=b.col;CTX.shadowBlur=b.type==='bomb'?16:5;CTX.shadowColor=b.col;
    CTX.beginPath();CTX.arc(b.x,b.y,b.r,0,Math.PI*2);CTX.fill();CTX.shadowBlur=0;
  });

  // Bots
  bots.forEach(b=>{if(b)drawBot(b);});
  // Player
  if(P)drawPlayer(now<stealthEnd,now<shieldEnd);

  CTX.restore();

  // Crosshair (screen space, after restore)
  CTX.strokeStyle='rgba(0,220,255,0.85)';CTX.lineWidth=1.5;
  CTX.beginPath();CTX.arc(Mouse.x,Mouse.y,9,0,Math.PI*2);CTX.stroke();
  CTX.beginPath();CTX.moveTo(Mouse.x,Mouse.y-16);CTX.lineTo(Mouse.x,Mouse.y-5);CTX.stroke();
  CTX.beginPath();CTX.moveTo(Mouse.x,Mouse.y+5);CTX.lineTo(Mouse.x,Mouse.y+16);CTX.stroke();
  CTX.beginPath();CTX.moveTo(Mouse.x-16,Mouse.y);CTX.lineTo(Mouse.x-5,Mouse.y);CTX.stroke();
  CTX.beginPath();CTX.moveTo(Mouse.x+5,Mouse.y);CTX.lineTo(Mouse.x+16,Mouse.y);CTX.stroke();

  renderMinimap();
}

function drawPlayer(stealthed,shielded){
  const r=mtr(P.mass);
  CTX.globalAlpha=stealthed?0.4:1;
  if(pFlag){
    CTX.fillStyle=pColor+'88';CTX.beginPath();CTX.arc(P.x,P.y,r,0,Math.PI*2);CTX.fill();
    CTX.save();CTX.beginPath();CTX.arc(P.x,P.y,r,0,Math.PI*2);CTX.clip();
    CTX.font=`${clamp(r*1.1,12,50)}px serif`;CTX.textAlign='center';CTX.textBaseline='middle';
    CTX.fillText(pFlag,P.x,P.y);CTX.restore();
  } else {
    CTX.fillStyle=pColor;CTX.beginPath();CTX.arc(P.x,P.y,r,0,Math.PI*2);CTX.fill();
  }
  CTX.globalAlpha=stealthed?0.3:0.9;
  CTX.strokeStyle=pColor;CTX.lineWidth=2;CTX.beginPath();CTX.arc(P.x,P.y,r,0,Math.PI*2);CTX.stroke();
  if(shielded){CTX.strokeStyle='rgba(180,180,255,0.9)';CTX.lineWidth=3;CTX.setLineDash([8,5]);CTX.beginPath();CTX.arc(P.x,P.y,r+12,0,Math.PI*2);CTX.stroke();CTX.setLineDash([]);}
  CTX.globalAlpha=1;
  if(r>10){
    CTX.shadowBlur=3;CTX.shadowColor='#000';
    CTX.fillStyle='#fff';CTX.font=`bold ${clamp(r*0.32,8,15)}px monospace`;CTX.textAlign='center';CTX.textBaseline='middle';
    CTX.fillText(pName,P.x,P.y-r*0.18);
    CTX.font=`${clamp(r*0.26,7,12)}px monospace`;CTX.fillStyle='rgba(255,255,255,0.7)';
    CTX.fillText(Math.floor(P.mass)+'M',P.x,P.y+r*0.26);CTX.shadowBlur=0;
  }
}

function drawBot(b){
  const r=mtr(b.mass);
  CTX.fillStyle=b.col;CTX.globalAlpha=0.85;CTX.beginPath();CTX.arc(b.x,b.y,r,0,Math.PI*2);CTX.fill();
  CTX.strokeStyle=b.col;CTX.lineWidth=1.5;CTX.globalAlpha=1;CTX.stroke();
  if(r>8){
    CTX.shadowBlur=2;CTX.shadowColor='#000';
    CTX.fillStyle='#fff';CTX.font=`bold ${clamp(r*0.32,7,13)}px monospace`;CTX.textAlign='center';CTX.textBaseline='middle';
    CTX.fillText(b.name,b.x,b.y-r*0.16);
    CTX.fillStyle='rgba(255,255,255,0.6)';CTX.font=`${clamp(r*0.26,6,11)}px monospace`;
    CTX.fillText(Math.floor(b.mass)+'M',b.x,b.y+r*0.26);CTX.shadowBlur=0;
  }
}

function renderMinimap(){
  const MS=130;
  MCTX.fillStyle='rgba(0,4,16,0.96)';MCTX.fillRect(0,0,MS,MS);
  const sx=MS/GW,sy=MS/GH;
  // Grid
  MCTX.strokeStyle='rgba(0,70,160,0.2)';MCTX.lineWidth=0.5;
  for(let g=0;g<=GRID;g++){
    MCTX.beginPath();MCTX.moveTo(g*CELL*sx,0);MCTX.lineTo(g*CELL*sx,MS);MCTX.stroke();
    MCTX.beginPath();MCTX.moveTo(0,g*CELL*sy);MCTX.lineTo(MS,g*CELL*sy);MCTX.stroke();
  }
  // Items (small dots, no bots/players)
  items.forEach(it=>{
    MCTX.fillStyle=it.col;MCTX.globalAlpha=0.6;
    MCTX.fillRect(it.x*sx-1,it.y*sy-1,2,2);
  });
  MCTX.globalAlpha=1;
  // Player ONLY
  if(P){
    const pr=Math.max(3,mtr(P.mass)*sx*5);
    MCTX.shadowBlur=8;MCTX.shadowColor='#0ff';
    MCTX.fillStyle='#0ff';MCTX.beginPath();MCTX.arc(P.x*sx,P.y*sy,pr,0,Math.PI*2);MCTX.fill();
    MCTX.shadowBlur=0;
    MCTX.fillStyle='rgba(0,220,255,0.75)';MCTX.font='bold 7px monospace';
    MCTX.textAlign='center';MCTX.textBaseline='top';
    MCTX.fillText(pName,P.x*sx,P.y*sy+pr+1);
  }
  // Viewport rect
  MCTX.strokeStyle='rgba(0,200,255,0.5)';MCTX.lineWidth=1;
  MCTX.strokeRect(camX*sx,camY*sy,SW*sx,SH*sy);
  // Border
  MCTX.strokeStyle='rgba(0,160,255,0.4)';MCTX.lineWidth=1;MCTX.strokeRect(0,0,MS,MS);
}

requestAnimationFrame(loop);
</script>
