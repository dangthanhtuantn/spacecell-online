<!DOCTYPE html>
<html lang='en'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width,initial-scale=1'>
<title>SpaceCell Online</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;overflow:hidden;font-family:'Courier New',monospace;user-select:none;cursor:none;}
canvas{display:block;}
/* Lobby */
#lobby{position:fixed;inset:0;background:radial-gradient(ellipse at center,#001428,#000208);display:flex;align-items:center;justify-content:center;z-index:200;cursor:default;}
.lbox{background:rgba(0,18,45,0.97);border:1px solid rgba(0,180,255,0.4);border-radius:16px;padding:28px 36px;width:520px;max-height:90vh;overflow-y:auto;}
.lbox h1{color:#0cf;font-size:24px;letter-spacing:5px;text-align:center;margin-bottom:4px;}
.lbox .sub{color:rgba(0,180,255,0.4);font-size:10px;letter-spacing:3px;text-align:center;margin-bottom:20px;}
.lbox label{display:block;color:#7dd8f0;font-size:11px;letter-spacing:2px;margin-bottom:6px;font-weight:bold;}
.lbox input[type=text]{width:100%;background:rgba(0,25,60,0.8);border:1px solid rgba(0,180,255,0.3);border-radius:6px;color:#fff;font-family:inherit;font-size:14px;padding:8px 12px;margin-bottom:18px;outline:none;}
.lbox input:focus{border-color:#0cf;}
.lsec{margin-bottom:16px;}
.tabs{display:flex;margin-bottom:10px;border-bottom:1px solid rgba(0,180,255,0.2);}
.tab{flex:1;padding:7px;text-align:center;font-size:11px;letter-spacing:1px;color:#6ab8d4;cursor:pointer;font-weight:bold;}
.tab.on{color:#0cf;border-bottom:2px solid #0cf;}
.colors{display:flex;gap:8px;flex-wrap:wrap;}
.csw{width:28px;height:28px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:transform .15s;}
.csw:hover,.csw.sel{transform:scale(1.3);border-color:#fff;}
.fgrid{display:grid;grid-template-columns:repeat(8,1fr);gap:4px;max-height:200px;overflow-y:auto;padding:2px;}
.flag{font-size:22px;text-align:center;padding:3px 2px;border-radius:4px;cursor:pointer;border:2px solid transparent;line-height:1.2;color:#fff;}
.flag:hover,.flag.sel{border-color:#0cf;background:rgba(0,180,255,0.12);}
.playbtn{width:100%;background:rgba(0,180,255,0.15);border:1px solid rgba(0,180,255,0.6);color:#0cf;font-family:inherit;font-size:13px;letter-spacing:3px;padding:11px;border-radius:8px;cursor:pointer;margin-top:6px;}
.playbtn:hover{background:rgba(0,180,255,0.3);}
/* HUD */
#hud{position:fixed;top:10px;left:10px;pointer-events:none;display:flex;flex-direction:column;gap:5px;}
.hb{background:rgba(0,10,28,0.9);border:1px solid rgba(0,180,255,0.25);border-radius:8px;padding:6px 12px;min-width:145px;}
.hl{color:rgba(0,180,255,0.55);font-size:9px;letter-spacing:2px;margin-bottom:1px;}
.hv{font-size:15px;font-weight:bold;color:#fff;}
#lb{position:fixed;top:10px;right:10px;background:rgba(0,10,28,0.9);border:1px solid rgba(0,180,255,0.25);border-radius:8px;padding:7px 12px;pointer-events:none;min-width:140px;}
#lb h4{color:rgba(0,180,255,0.55);font-size:9px;letter-spacing:2px;margin-bottom:4px;}
.le{font-size:11px;color:#bbb;padding:1px 0;}.le.me{color:#0ff;font-weight:bold;}
/* Skill bar */
#inv{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);display:flex;gap:6px;pointer-events:none;}
.sk{background:rgba(0,10,28,0.93);border:1px solid rgba(0,180,255,0.32);border-radius:8px;padding:5px 9px;text-align:center;min-width:52px;}
.sk .k{font-size:12px;font-weight:bold;color:#0ff;}.sk .n{color:#444;font-size:8px;letter-spacing:1px;margin-top:1px;}
.sk .cnt{color:#ff0;font-size:11px;font-weight:bold;min-height:14px;}.sk .cd{color:#f80;font-size:9px;min-height:11px;}
.sk.act{border-color:#0ff;background:rgba(0,40,65,0.9);}.sk.emp .k{color:rgba(0,180,255,0.2);}.sk.fire{border-color:#f80;}
/* Minimap */
#mmw{position:fixed;bottom:14px;right:14px;pointer-events:none;}
#mmw .mml{color:rgba(0,180,255,0.45);font-size:9px;letter-spacing:1px;text-align:center;margin-bottom:3px;}
#mm{border:1px solid rgba(0,180,255,0.35);border-radius:6px;display:block;}
/* Ping */
#pingbar{position:fixed;top:10px;left:50%;transform:translateX(-50%);background:rgba(0,10,28,0.85);border:1px solid rgba(0,180,255,0.2);border-radius:20px;padding:4px 14px;font-size:10px;color:rgba(0,180,255,0.6);pointer-events:none;}
/* Messages */
#msgs{position:fixed;top:40px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;gap:3px;pointer-events:none;align-items:center;z-index:50;}
.msg{background:rgba(0,10,28,0.93);border-left:3px solid #0cf;padding:3px 12px;font-size:11px;color:#ccc;border-radius:0 4px 4px 0;transition:opacity .5s;white-space:nowrap;}
/* Dead screen */
#dead{position:fixed;inset:0;background:rgba(0,0,0,0.88);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:100;}ems:center;justify-content:center;gap:14px;z-index:99;cursor:default;}
#dead h2{color:#f44;font-size:28px;letter-spacing:4px;}
#dead p{color:#aaa;font-size:13px;}
#dead button{background:rgba(0,180,255,0.2);border:1px solid rgba(0,180,255,0.6);color:#0cf;font-family:inherit;font-size:13px;padding:10px 26px;border-radius:6px;cursor:pointer;letter-spacing:2px;}
</style>
</head>
<body>

<canvas id="gc"></canvas>

<!-- Minimap -->
<div id="mmw"><div class="mml">MINIMAP</div><canvas id="mm" width="130" height="130"></canvas></div>

<!-- HUD -->
<div id="hud">
  <div class="hb"><div class="hl">MASS</div><div class="hv" id="hm">-</div></div>
  <div class="hb"><div class="hl">SPEED</div><div class="hv" id="hs">-</div></div>
  <div class="hb"><div class="hl">RANK</div><div class="hv" id="hr">-</div></div>
</div>
<div id="lb"><h4>LEADERBOARD</h4><div id="lbr"></div></div>
<div id="pingbar">Ping: <span id="pingval">--</span> ms</div>

<!-- Skill bar -->
<div id="inv">
  <div class="sk" id="skQ"><div class="k">S</div><div class="n">SPEED</div><div class="cnt" id="cntQ">0</div><div class="cd" id="cdQ"></div></div>
  <div class="sk" id="skW"><div class="k">E</div><div class="n">SHIELD</div><div class="cnt" id="cntW">0</div><div class="cd" id="cdW"></div></div>
  <div class="sk" id="skE"><div class="k">🖱</div><div class="n">SHOOT</div><div class="cnt" id="cntE">∞</div><div class="cd" id="cdE"></div></div>
  <div class="sk" id="skR"><div class="k">T</div><div class="n">STEALTH</div><div class="cnt" id="cntR">0</div><div class="cd" id="cdR"></div></div>
  <div class="sk" id="skB"><div class="k">B</div><div class="n">BOMB</div><div class="cnt" id="cntB">0</div><div class="cd" id="cdB"></div></div>
  <div class="sk" id="skF"><div class="k">F</div><div class="n">MAGNET</div><div class="cnt" id="cntF">-</div><div class="cd" id="cdF"></div></div>
  <div class="sk" id="skG"><div class="k">🖱</div><div class="n">BULLET</div><div class="cnt" id="cntG">0</div><div class="cd" id="cdG"></div></div>
</div>

<div id="msgs"></div>

<!-- Death screen -->
<div id="dead">
  <div style="background:rgba(0,5,20,0.97);border:1px solid rgba(255,50,50,0.4);border-radius:12px;padding:32px 40px;text-align:center;max-width:360px;width:90%">
    <h2 style="color:#f44;font-size:26px;letter-spacing:4px;margin:0 0 8px">ELIMINATED</h2>
    <p id="dm" style="color:#aaa;font-size:13px;margin:0 0 20px">Bạn đã bị hấp thụ!</p>
    <!-- Quảng cáo 300x250 -->
    <div style="width:300px;height:250px;margin:0 auto 20px;background:rgba(0,10,28,0.9);border:1px solid rgba(255,80,80,0.15);border-radius:8px;display:flex;align-items:center;justify-content:center;color:rgba(255,80,80,0.3);font-size:11px;letter-spacing:1px;">
      ADVERTISEMENT
    </div>
    <button id="respawnBtn" style="background:rgba(0,180,255,0.15);border:1px solid rgba(0,180,255,0.6);color:#0cf;font-family:'Courier New',monospace;font-size:14px;letter-spacing:2px;padding:10px 32px;border-radius:6px;cursor:pointer;width:100%">
      ▶ CHƠI LẠI
    </button>
  </div>
</div>

<!-- Lobby -->
<div id="lobby">
  <div class="lbox">
    <h1>SPACECELL</h1>
    <div class="sub">ONLINE MULTIPLAYER</div>
    <label>TÊN NGƯỜI CHƠI</label>
    <input type="text" id="ni" maxlength="16" placeholder="Nhập tên..." value="Player">
    <label style="margin-top:12px">MÀU SẮC</label>
    <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px" id="colorGrid"></div>
    <button class="playbtn" id="sb">▶ &nbsp;PLAY NOW</button>
    <!-- Quảng cáo 300x250 -->
    <div style="width:300px;height:250px;margin:16px auto 0;background:rgba(0,10,28,0.8);border:1px solid rgba(0,180,255,0.15);border-radius:8px;display:flex;align-items:center;justify-content:center;color:rgba(0,180,255,0.3);font-size:11px;letter-spacing:1px;">
      ADVERTISEMENT
    </div>
  </div>
</div>


<script src='/socket.io/socket.io.js'></script>
<script>
// ── Config ────────────────────────────────────────────────────
const TICK_MS=33;
const INTERP_DELAY=150;

// ── Color picker init ─────────────────────────────────────────
const COLORS=['#00cfff','#ff4466','#44ff88','#ffaa00','#aa44ff','#ff44aa','#00ffcc','#ff8800','#4488ff','#ffff44','#ff6644','#88ff44'];
let selectedColor=COLORS[0];
(function initColorGrid(){
  const grid=document.getElementById('colorGrid');
  if(!grid)return;
  COLORS.forEach(col=>{
    const el=document.createElement('div');
    el.style.cssText=`width:32px;height:32px;border-radius:50%;background:${col};cursor:pointer;border:3px solid transparent;transition:border-color 0.15s`;
    if(col===selectedColor)el.style.borderColor='#fff';
    el.onclick=()=>{
      selectedColor=col;
      grid.querySelectorAll('div').forEach(d=>d.style.borderColor='transparent');
      el.style.borderColor='#fff';
    };
    grid.appendChild(el);
  });
})();

// ── Canvas ────────────────────────────────────────────────────
const CVS=document.getElementById('gc');
const CTX=CVS.getContext('2d');
const MCV=document.getElementById('mm');
const MCX=MCV.getContext('2d');
let SW=window.innerWidth,SH=window.innerHeight;
CVS.width=SW;CVS.height=SH;
window.addEventListener('resize',()=>{SW=window.innerWidth;SH=window.innerHeight;CVS.width=SW;CVS.height=SH;});

// ── State ─────────────────────────────────────────────────────
const mtr=m=>Math.sqrt(m)*1.5+3;
const clamp=(v,a,b)=>v<a?a:v>b?b:v;
function speedMult(m){
  if(m>=10000)return 0.5184;
  if(m>=5000) return 0.576;
  if(m>=2000) return 0.640;
  if(m>=1000) return 0.800;
  return 1.000;
}

let socket=null,myId=null,myColor='#00cfff',myName='Player',myFlag=null;
let GW=6000,GH=6000;
let food=[],items=[];
let gameActive=false;
let camX=0,camY=0;
let pingTime=0,latency=0;
const parts=[];
const STARS=[];
const Keys={};
const Mouse={x:0,y:0};

// Ring buffer for server snapshots
const SNAP_N=8;
const snaps=Array.from({length:SNAP_N},()=>({t:0,players:[],bots:[],bullets:[]}));
let snapHead=0,snapCount=0;

function pushSnap(snap){
  snapHead=(snapHead+1)%SNAP_N;
  snaps[snapHead]=snap;
  if(snapCount<SNAP_N)snapCount++;
}

// ── Interpolation — smooth lerp between snapshots ─────────────
function lerp(a,b,t){return a+(b-a)*t;}
function slerp(a,b,t){const s=t*t*(3-2*t);return a+(b-a)*s;} // smoothstep

function getInterp(){
  if(snapCount<2){const s=snaps[snapHead];return{players:s.players,bots:s.bots,bullets:s.bullets};}
  const renderT=Date.now()-INTERP_DELAY;
  // Find prev (newest snapshot <= renderT) and curr (one newer)
  let prevIdx=-1,currIdx=-1;
  for(let i=0;i<snapCount;i++){
    const idx=(snapHead-i+SNAP_N)%SNAP_N;
    if(snaps[idx].t<=renderT){
      prevIdx=idx;
      currIdx=(snapHead-(i-1)+SNAP_N)%SNAP_N;
      break;
    }
  }
  if(prevIdx===-1){prevIdx=(snapHead-snapCount+1+SNAP_N)%SNAP_N;currIdx=(snapHead-snapCount+2+SNAP_N)%SNAP_N;}
  if(currIdx===prevIdx||currIdx===-1){currIdx=snapHead;prevIdx=(snapHead-1+SNAP_N)%SNAP_N;}
  const prev=snaps[prevIdx],curr=snaps[currIdx];
  const dt=curr.t-prev.t;
  const t=dt<=0?1:Math.max(0,Math.min(1,(renderT-prev.t)/dt));
  const pMap=new Map(prev.players.map(p=>[p.id,p]));
  const bMap=new Map(prev.bots.map(b=>[b.id,b]));
  const players=curr.players.map(c=>{
    const p=pMap.get(c.id);if(!p)return c;
    return{...c,x:slerp(p.x,c.x,t),y:slerp(p.y,c.y,t)};
  });
  const bots=curr.bots.map(c=>{
    const p=bMap.get(c.id);if(!p)return c;
    return{...c,x:slerp(p.x,c.x,t),y:slerp(p.y,c.y,t)};
  });
  return{players,bots,bullets:snaps[snapHead].bullets}; // bullets always latest
}

// ── Messages ──────────────────────────────────────────────────
function addMsg(text,col){
  const d=document.getElementById('msgs');
  if(!d)return;
  const el=document.createElement('div');el.className='msg';
  el.style.color=col||'#fff';el.textContent=text;
  d.appendChild(el);setTimeout(()=>el.remove(),4000);
}

// ── Particles ─────────────────────────────────────────────────
function spark(x,y,col,n=20,big=false){
  const scale=big?3:1;
  // Core particles
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,spd=(2+Math.random()*6)*scale;
    parts.push({x,y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,r:(1.5+Math.random()*3)*scale,life:20+Math.random()*25,col,glow:big});
  }
  // Ring wave (big only)
  if(big){
    parts.push({x,y,vx:0,vy:0,r:5,life:20,col,ring:true,grow:big?6:3});
    parts.push({x,y,vx:0,vy:0,r:3,life:14,col:'#fff',ring:true,grow:big?10:5});
  }
}

// ── Stars ─────────────────────────────────────────────────────
function initStars(){
  STARS.length=0;
  for(let i=0;i<200;i++)STARS.push({x:Math.random()*GW,y:Math.random()*GH,r:Math.random()*1.5+0.3,a:0.2+Math.random()*0.6});
}

// ── Networking ────────────────────────────────────────────────
function connect(){
  const name=document.getElementById('ni').value.trim()||'Player';
  const color=selectedColor||'#00cfff';
  myName=name;myColor=color;myFlag=null;
  socket=io();

  socket.on('init',d=>{
    myId=d.id;GW=d.worldW;GH=d.worldH;
    food=d.food||[];items=d.items||[];
    // Init snapshots with initial bots
    const initSnap={t:Date.now(),players:[],bots:d.bots||[],bullets:[]};
    for(let i=0;i<SNAP_N;i++)snaps[i]={...initSnap};
    snapHead=0;snapCount=1;
    // Full client state reset (covers both first join and respawn)
    predX=null;predY=null;currentMe=null;
    dashEndT=0;dashVx=0;dashVy=0;
    mouseDown=false;
    Object.keys(Keys).forEach(k=>delete Keys[k]);
    camX=GW/2-window.innerWidth/2;camY=GH/2-window.innerHeight/2;
    initStars();
    gameActive=true;
    document.getElementById('lobby').style.display='none';
    document.getElementById('dead').style.display='none';
  });

  socket.on('state',s=>{
    // Expand compact keys
    const players=(s.p||[]).map(p=>({
      id:p.i,name:p.n,color:p.c,flag:p.f,
      x:p.x,y:p.y,mass:p.m,
      shielded:!!p.sh,stealthed:!!p.st,
      inv:p.inv,cdQ:p.cQ,cdW:p.cW,cdR:p.cR,cdB:p.cB,speedEnd:p.sE,magnetEnd:p.mE,shieldEnd:p.shE,stealthEnd:p.stE,bulletEnd:p.bE
    }));
    const bots=(s.b||[]).map(b=>({id:b.i,x:b.x,y:b.y,mass:b.m,col:b.c,name:b.n}));
    const bullets=(s.u||[]).map(b=>({id:b.i,x:b.x,y:b.y,r:b.r,col:b.c,type:b.t?'bomb':'shot'}));
    pushSnap({t:Date.now(),players,bots,bullets});
    // Update HUD from self
    // HUD uses latest server data for accurate inv/cd display
    const meHud=players.find(p=>p.id===myId);
    if(meHud)updateHUD(meHud);
  });

  // worldUpdate removed - food synced via init + foodEaten, items via itemAdded/itemRemoved
  socket.on('itemAdded',it=>{items.push(it);});
  socket.on('itemRemoved',id=>{const i=items.findIndex(x=>x.id===id);if(i!==-1)items.splice(i,1);});
  socket.on('foodEaten',d=>{
    // Update food immediately to new position
    if(food[d.ni])food[d.ni]=d.nf;
  });
  socket.on('died',({by})=>{
    const dm=document.getElementById('dm');
    if(dm)dm.textContent='Bị hấp thụ bởi '+by+'!';
    const dead=document.getElementById('dead');
    if(dead)dead.style.display='flex';
    // Hard reset prediction on death so it snaps to new spawn, not old position
    predX=null;predY=null;
  });
  socket.on('explode',({x,y,nx,ny,r,col,big})=>{
    if(big){
      // Big explosion: eat bot or item
      spark(x,y,col,35,true);
      spark(x,y,'#fff',15,false);
    } else {
      spark(x-(nx||0)*(r||20),y-(ny||0)*(r||20),col,18);
    }
  });
  socket.on('msg',({text,col})=>addMsg(text,col));
  socket.on('playerLeft',id=>{});
  socket.on('playerList',list=>{
    const lb=document.getElementById('lbr');if(!lb)return;
    lb.innerHTML=list.slice(0,8).map((e,i)=>'<div class="le'+(e.id===myId?' me':'')+'">'+(i+1)+'. '+e.name+' '+e.mass+'</div>').join('');
  });
  socket.on('pong',t=>{
    latency=Date.now()-pingTime;
    const el=document.getElementById('pingval');if(el)el.textContent=latency;
    setTimeout(doPing,2000);
  });
  doPing();
  socket.emit('join',{name,color,flag:myFlag});
}

function doPing(){if(!socket||!socket.connected)return;pingTime=Date.now();socket.emit('ping');}

// ── HUD ───────────────────────────────────────────────────────
function updateHUD(me){
  const hm=document.getElementById('hm');if(hm)hm.textContent=Math.floor(me.mass)+' M';
  const hs=document.getElementById('hs');if(hs)hs.textContent=Math.round(speedMult(me.mass)*100)+'%';
  if(me.inv){
    const nh=Date.now();
    const speedRem=me.speedEnd?Math.max(0,me.speedEnd-nh):0;
    updSk('Q',speedRem>0?1:(me.inv.speed||0),speedRem,false,false); // S=SPEED
    const shRem=me.shieldEnd?Math.max(0,me.shieldEnd-nh):0;
    updSk('W',shRem>0?1:(me.inv.shield||0),shRem,false,false);     // E=SHIELD
    updSk('E',1,0,true,false);                                       // mouse=SHOOT
    const stRem=me.stealthEnd?Math.max(0,me.stealthEnd-nh):0;
    updSk('R',stRem>0?1:(me.inv.stealth||0),stRem,false,false);    // T=STEALTH
    updSk('B',me.inv.bomb||0,me.cdB,false,false);                   // B=BOMB
    const magRem=me.magnetEnd?Math.max(0,me.magnetEnd-nh):0;
    updSk('F',magRem>0?'M':' ',magRem,false,false); // MAGNET auto, timer only
    const bulRem=me.bulletEnd?Math.max(0,me.bulletEnd-nh):0;
    updSk('G',bulRem>0?1:(me.inv&&me.inv.bullet||0),bulRem,false,false); // BULLET
  }
  // Rank
  const interp=getInterp();
  const all=[...(interp.players||[]),...(interp.bots||[])].map(e=>e.mass).sort((a,b)=>b-a);
  const hr=document.getElementById('hr');if(hr)hr.textContent='#'+(all.findIndex(m=>m===me.mass)+1||'?');
}

function updSk(k,count,cd,isFire,isToggle){
  const box=document.getElementById('sk'+k);const cnt=document.getElementById('cnt'+k);const cde=document.getElementById('cd'+k);
  if(!box||!cnt)return;
  const active=isFire||count>0;
  const onCD=cd>0;
  cnt.textContent=isFire?'∞':count;
  cde.textContent=onCD?(cd/1000).toFixed(1)+'s':'';
  box.className='sk'+(active?' act':count===0?' emp':'')+(onCD?' cd':'');
}

// ── Input ─────────────────────────────────────────────────────
window.addEventListener('keydown',e=>{if(!Keys[e.code]){Keys[e.code]=true;handleKey(e.code);}});
window.addEventListener('keyup',e=>{Keys[e.code]=false;});
window.addEventListener('mousemove',e=>{Mouse.x=e.clientX;Mouse.y=e.clientY;});
let mouseDown=false;
window.addEventListener('mousedown',e=>{if(e.button===0&&gameActive)mouseDown=true;});
window.addEventListener('mouseup',e=>{if(e.button===0)mouseDown=false;});

function handleKey(code){
  if(!socket||!myId||!gameActive)return;
  // Get self from interpolated state for checks
  const interp=getInterp();
  const me=interp.players.find(p=>p.id===myId);
  const mdx=Mouse.x-SW/2,mdy=Mouse.y-SH/2,ml=Math.hypot(mdx,mdy)||1;
  if(code==='KeyS'){
    const cme=currentMe;
    if(!cme||!cme.inv||!(cme.inv.speed>0))return;
    socket.emit('speed');
    // Immediately apply speed boost in prediction (don't wait for server round-trip)
    if(cme)cme.speedEnd=Date.now()+3000;
  }
  if(code==='KeyE'){const cme=currentMe;if(!cme||!cme.inv||!cme.inv.shield)return;socket.emit('shield');}
  if(code==='KeyT'){const cme=currentMe;if(!cme||!cme.inv||!cme.inv.stealth)return;socket.emit('stealth');}
  if(code==='KeyB'){const wx=Mouse.x+camX,wy=Mouse.y+camY;const dx=wx-(me?me.x:camX+SW/2),dy=wy-(me?me.y:camY+SH/2);const l=Math.hypot(dx,dy)||1;socket.emit('bomb',{nx:dx/l,ny:dy/l});}
  // F (magnet auto-activates on pickup)
}

// Send input every tick
let _lastShot=0;
setInterval(()=>{
  if(!socket||!myId||!gameActive)return;
  const mdx=Mouse.x-SW/2,mdy=Mouse.y-SH/2,ml=Math.hypot(mdx,mdy)||1;
  socket.emit('input',{vx:ml>15?mdx/ml:0,vy:ml>15?mdy/ml:0});
  // Shoot on mouse left button hold
  if(mouseDown){
    const now=Date.now();
    const bulletOn=currentMe&&currentMe.bulletEnd&&now<currentMe.bulletEnd;
    const cd=bulletOn?125:250; // 8/s bullet mode, 4/s normal
    if(now-_lastShot>=cd){
      _lastShot=now;
      const me2=currentMe;
      if(me2&&me2.mass>20){
        // Use pure cursor direction from screen center
        const dx=Mouse.x-SW/2, dy=Mouse.y-SH/2, l=Math.hypot(dx,dy)||1;
        if(l<5)return; // don't shoot if cursor at center
        const nx=dx/l, ny=dy/l;
        // Send predicted position so server spawns bullet from visual location
        socket.emit('shoot',{nx,ny,px:me2.x,py:me2.y});
      }
    }
  }
},33);


// ── Drawing ───────────────────────────────────────────────────
function drawMe(p){
  const r=mtr(p.mass);
  CTX.globalAlpha=p.stealthed?0.4:1;
  if(p.shielded){CTX.strokeStyle='#88f';CTX.lineWidth=4;CTX.beginPath();CTX.arc(p.x,p.y,r+4,0,Math.PI*2);CTX.stroke();}
  if(myFlag){
    CTX.fillStyle=myColor+'88';CTX.beginPath();CTX.arc(p.x,p.y,r,0,Math.PI*2);CTX.fill();
    CTX.save();CTX.beginPath();CTX.arc(p.x,p.y,r,0,Math.PI*2);CTX.clip();
    CTX.font=`${clamp(r*1.1,12,50)}px serif`;CTX.textAlign='center';CTX.textBaseline='middle';CTX.fillText(myFlag,p.x,p.y);
    CTX.restore();
  } else {
    CTX.fillStyle=myColor;CTX.beginPath();CTX.arc(p.x,p.y,r,0,Math.PI*2);CTX.fill();
  }
  if(r>8){
    CTX.fillStyle='#fff';CTX.font=`bold ${clamp(r*0.35,8,16)}px monospace`;
    CTX.textAlign='center';CTX.textBaseline='middle';CTX.shadowBlur=3;CTX.shadowColor='#000';
    CTX.fillText(p.name,p.x,p.y-r*0.15);
    CTX.fillStyle='rgba(255,255,255,0.7)';CTX.font=`${clamp(r*0.28,7,13)}px monospace`;
    CTX.fillText(Math.floor(p.mass)+'M',p.x,p.y+r*0.25);CTX.shadowBlur=0;
  }
  CTX.globalAlpha=1;
}

function drawOther(p){
  const r=mtr(p.mass);
  CTX.globalAlpha=p.stealthed?0.15:1;
  if(p.shielded){CTX.strokeStyle='#88f';CTX.lineWidth=3;CTX.beginPath();CTX.arc(p.x,p.y,r+3,0,Math.PI*2);CTX.stroke();}
  if(p.flag){
    CTX.fillStyle=p.color+'88';CTX.beginPath();CTX.arc(p.x,p.y,r,0,Math.PI*2);CTX.fill();
    CTX.save();CTX.beginPath();CTX.arc(p.x,p.y,r,0,Math.PI*2);CTX.clip();
    CTX.font=`${clamp(r*1.1,12,50)}px serif`;CTX.textAlign='center';CTX.textBaseline='middle';CTX.fillText(p.flag,p.x,p.y);
    CTX.restore();
  } else {
    CTX.fillStyle=p.color;CTX.beginPath();CTX.arc(p.x,p.y,r,0,Math.PI*2);CTX.fill();
  }
  if(r>8){
    CTX.fillStyle='#fff';CTX.font=`bold ${clamp(r*0.35,8,16)}px monospace`;
    CTX.textAlign='center';CTX.textBaseline='middle';CTX.shadowBlur=3;CTX.shadowColor='#000';
    CTX.fillText(p.name,p.x,p.y-r*0.15);
    CTX.fillStyle='rgba(255,255,255,0.7)';CTX.font=`${clamp(r*0.28,7,13)}px monospace`;
    CTX.fillText(Math.floor(p.mass)+'M',p.x,p.y+r*0.25);CTX.shadowBlur=0;
  }
  CTX.globalAlpha=1;
}

function drawBot(b){
  const r=mtr(b.mass);
  CTX.fillStyle=b.col;CTX.globalAlpha=0.85;CTX.beginPath();CTX.arc(b.x,b.y,r,0,Math.PI*2);CTX.fill();
  CTX.strokeStyle=b.col;CTX.lineWidth=1.5;CTX.globalAlpha=1;CTX.stroke();
  if(r>8){
    CTX.fillStyle='#fff';CTX.font=`bold ${clamp(r*0.3,7,13)}px monospace`;
    CTX.textAlign='center';CTX.textBaseline='middle';CTX.shadowBlur=2;CTX.shadowColor='#000';
    CTX.fillText(b.name,b.x,b.y-r*0.15);
    CTX.fillStyle='rgba(255,255,255,0.6)';CTX.font=`${clamp(r*0.24,6,11)}px monospace`;
    CTX.fillText(Math.floor(b.mass)+'M',b.x,b.y+r*0.25);CTX.shadowBlur=0;
  }
}

// ── Render ────────────────────────────────────────────────────
function render(){
  if(!gameActive){CTX.fillStyle='#0a0a1a';CTX.fillRect(0,0,SW,SH);return;}
  const interp=getInterp();
  const me=currentMe; // predicted position from loop()
  if(me){
    camX=me.x-SW/2;
    camY=me.y-SH/2;
  }
  camX=clamp(camX,0,Math.max(0,GW-SW));camY=clamp(camY,0,Math.max(0,GH-SH));

  CTX.fillStyle='#0a0a1a';CTX.fillRect(0,0,SW,SH);
  CTX.save();CTX.translate(-camX,-camY);

  // Stars
  STARS.forEach(s=>{CTX.fillStyle=`rgba(255,255,255,${s.a})`;CTX.beginPath();CTX.arc(s.x,s.y,s.r,0,Math.PI*2);CTX.fill();});

  // Grid
  CTX.strokeStyle='rgba(255,255,255,0.04)';CTX.lineWidth=1;
  const gc0=Math.floor(camX/500)*500,gr0=Math.floor(camY/500)*500;
  for(let gx=gc0;gx<camX+SW+500;gx+=500){CTX.beginPath();CTX.moveTo(gx,0);CTX.lineTo(gx,GH);CTX.stroke();}
  for(let gy=gr0;gy<camY+SH+500;gy+=500){CTX.beginPath();CTX.moveTo(0,gy);CTX.lineTo(GW,gy);CTX.stroke();}
  // Play zone boundary (600..6600 in 7200x7200 map)
  const BMIN=600,BMAX=6600;
  // Dim corridor outside play zone
  CTX.fillStyle='rgba(0,0,0,0.45)';
  CTX.fillRect(0,0,GW,BMIN);
  CTX.fillRect(0,BMAX,GW,GH-BMAX);
  CTX.fillRect(0,BMIN,BMIN,BMAX-BMIN);
  CTX.fillRect(BMAX,BMIN,GW-BMAX,BMAX-BMIN);
  // Red dashed boundary line
  CTX.strokeStyle='rgba(255,60,60,0.9)';CTX.lineWidth=4;
  CTX.setLineDash([24,12]);
  CTX.strokeRect(BMIN,BMIN,BMAX-BMIN,BMAX-BMIN);
  CTX.setLineDash([]);


  // Food
  food.forEach(f=>{
    if(!f||f.x<camX-20||f.x>camX+SW+20||f.y<camY-20||f.y>camY+SH+20)return;
    CTX.fillStyle=f.col;CTX.beginPath();CTX.arc(f.x,f.y,f.r,0,Math.PI*2);CTX.fill();
  });

  // Items
  items.forEach(it=>{
    if(it.x<camX-50||it.x>camX+SW+50||it.y<camY-50||it.y>camY+SH+50)return;
    if(!it._a)it._a=0;it._a++;
    const pulse=Math.sin(it._a*0.06)*0.25+0.75;
    CTX.globalAlpha=pulse*0.35;CTX.fillStyle=it.col;CTX.beginPath();CTX.arc(it.x,it.y,it.r+8,0,Math.PI*2);CTX.fill();
    CTX.globalAlpha=1;CTX.fillStyle=it.col;CTX.beginPath();CTX.arc(it.x,it.y,it.r,0,Math.PI*2);CTX.fill();
    CTX.font='bold 11px monospace';CTX.textAlign='center';CTX.textBaseline='middle';
    CTX.fillStyle='#000';CTX.lineWidth=0;
    CTX.fillText(it.label||it.type,it.x,it.y);
  });

  // Draw ALL bullets from server (same for player and bot)
  function drawBullet(b,isBomb){
    CTX.save();
    CTX.shadowBlur=isBomb?20:10;CTX.shadowColor=b.col;
    CTX.fillStyle=b.col+'99';
    CTX.beginPath();CTX.arc(b.x,b.y,b.r+3,0,Math.PI*2);CTX.fill();
    CTX.shadowBlur=isBomb?14:6;
    CTX.fillStyle=b.col;
    CTX.beginPath();CTX.arc(b.x,b.y,b.r,0,Math.PI*2);CTX.fill();
    CTX.shadowBlur=0;CTX.fillStyle='#fff';
    CTX.beginPath();CTX.arc(b.x,b.y,b.r*0.4,0,Math.PI*2);CTX.fill();
    CTX.restore();
  }
  // Show all bullets including own — identical behavior for player and bot
  (interp.bullets||[]).forEach(b=>drawBullet(b,b.type==='bomb'));

  // Bots
  (interp.bots||[]).forEach(drawBot);

  // Other players
  (interp.players||[]).forEach(p=>{if(p.id!==myId)drawOther(p);});

  // Self — drawn at PREDICTED position (matches server, no lag)
  if(me)drawMe(me);

  // Particles
  for(let i=parts.length-1;i>=0;i--){
    const p=parts[i];
    const alpha=p.life/35;
    CTX.globalAlpha=Math.min(1,alpha);
    if(p.ring){
      // Expanding ring wave
      CTX.strokeStyle=p.col;CTX.lineWidth=3*alpha;
      CTX.beginPath();CTX.arc(p.x,p.y,p.r,0,Math.PI*2);CTX.stroke();
      p.r+=p.grow||4;
    } else {
      if(p.glow){CTX.shadowBlur=12;CTX.shadowColor=p.col;}
      CTX.fillStyle=p.col;
      CTX.beginPath();CTX.arc(p.x,p.y,Math.max(0.1,p.r),0,Math.PI*2);CTX.fill();
      if(p.glow){CTX.shadowBlur=0;}
    }
    p.x+=p.vx;p.y+=p.vy;p.vx*=0.88;p.vy*=0.88;p.r*=p.ring?1:(0.93);p.life--;
    if(p.life<=0)parts.splice(i,1);
  }
  CTX.globalAlpha=1;
  CTX.restore();

  // Draw cursor: line from player screen pos to mouse, aim dot at mouse
  if(gameActive&&me){
    const px=me.x-camX; // me.x = predX
    const py=me.y-camY;
    const mx=Mouse.x, my=Mouse.y;      // mouse screen position
    const dx=mx-px, dy=my-py, dl=Math.hypot(dx,dy)||1;
    const isShoot=mouseDown;
    const col=isShoot?'rgba(255,220,0,0.9)':'rgba(0,200,255,0.8)';
    const colFade=isShoot?'rgba(255,220,0,0.15)':'rgba(0,200,255,0.12)';
    const pr=mtr(me.mass); // player radius

    CTX.save();

    // Dashed line from player edge to mouse
    const startX=px+dx/dl*pr, startY=py+dy/dl*pr;
    CTX.setLineDash([6,5]);
    CTX.strokeStyle=colFade;CTX.lineWidth=1.5;
    CTX.beginPath();CTX.moveTo(startX,startY);CTX.lineTo(mx,my);CTX.stroke();
    CTX.setLineDash([]);

    // Aim crosshair at mouse position
    const r=10;
    CTX.strokeStyle=col;CTX.lineWidth=1.5;CTX.globalAlpha=0.95;
    CTX.beginPath();CTX.arc(mx,my,r,0,Math.PI*2);CTX.stroke();
    // 4 tick marks outside ring
    [[0,-(r+5),0,-(r+9)],[0,(r+5),0,(r+9)],[-(r+5),0,-(r+9),0],[(r+5),0,(r+9),0]].forEach(([x1,y1,x2,y2])=>{
      CTX.beginPath();CTX.moveTo(mx+x1,my+y1);CTX.lineTo(mx+x2,my+y2);CTX.stroke();
    });
    // Center dot
    CTX.fillStyle=col;CTX.beginPath();CTX.arc(mx,my,2.5,0,Math.PI*2);CTX.fill();

    CTX.restore();
  }
  renderMinimap(interp,me);
}

function renderMinimap(interp,me){
  const MS=130,scale=MS/Math.max(GW,GH);
  MCX.fillStyle='rgba(0,0,0,0.7)';MCX.fillRect(0,0,MS,MS);
  MCX.strokeStyle='#333';MCX.lineWidth=1;MCX.strokeRect(0,0,MS,MS);
  // Food dots
  food.forEach(f=>{MCX.fillStyle='rgba(255,255,255,0.15)';MCX.fillRect(f.x*scale-0.5,f.y*scale-0.5,1,1);});
  // Bots
  (interp.bots||[]).forEach(b=>{MCX.fillStyle=b.col;MCX.beginPath();MCX.arc(b.x*scale,b.y*scale,2,0,Math.PI*2);MCX.fill();});
  // Players
  (interp.players||[]).forEach(p=>{
    MCX.fillStyle=p.id===myId?'#fff':p.color;
    MCX.beginPath();MCX.arc(p.x*scale,p.y*scale,p.id===myId?3:2,0,Math.PI*2);MCX.fill();
  });
  if(me){MCX.strokeStyle='rgba(255,255,255,0.3)';MCX.strokeRect(camX*scale,camY*scale,(window.innerWidth)*scale,(window.innerHeight)*scale);}
}

// ── Game loop ─────────────────────────────────────────────────
// Client prediction matching server physics EXACTLY
// Server: p.vx = inputVx*spd; p.x += p.vx; (direct, no lerp/friction)
// Client: predVx = inputVx*spd; predX += predVx; (identical)
// -> predX === server p.x -> no drift -> no reconcile -> no edge pull
let predX=null,predY=null,lastLoopT=Date.now(),currentMe=null;
let dashVx=0,dashVy=0,dashEndT=0; // time-based dash, not frame-based

function loop(){
  requestAnimationFrame(loop);
  const nowT=Date.now();
  const dtMs=Math.min(nowT-lastLoopT,50);lastLoopT=nowT;
  const dtFrac=dtMs/TICK_MS;

  // Get interpolated state for others (bots/players)
  const interp=getInterp();
  // Self: from latest snapshot for HUD/skill updates
  const latestMe=snaps[snapHead].players.find(p=>p.id===myId);

  // Client prediction: EXACT same physics as server
  if(latestMe){
    if(predX===null){predX=latestMe.x;predY=latestMe.y;}
    const mdx=Mouse.x-SW/2,mdy=Mouse.y-SH/2,ml=Math.hypot(mdx,mdy)||1;
    const speedMod2=(latestMe.speedEnd&&Date.now()<latestMe.speedEnd)?2:1;
    const spd=8*speedMult(latestMe.mass)*speedMod2;
    const inputVx=ml>15?mdx/ml:0, inputVy=ml>15?mdy/ml:0;
    const pr=mtr(latestMe.mass);
    // During dash: server handles physics, client follows server pos directly
    // (client prediction of dash velocity causes map drift due to dtFrac scaling)
    let pvx,pvy;
    if(nowT<dashEndT+200){
      // Fast lerp toward server pos during dash - smooth even between state updates
      predX+=(latestMe.x-predX)*0.35;
      predY+=(latestMe.y-predY)*0.35;
    } else {
      pvx=inputVx*spd;pvy=inputVy*spd;
      predX=Math.max(600+pr,Math.min(6600-pr,predX+pvx*dtFrac));
      predY=Math.max(600+pr,Math.min(6600-pr,predY+pvy*dtFrac));
    }
  }

  // currentMe is module-level so render() can access predicted position
  currentMe=latestMe?{...latestMe,x:predX,y:predY}:null;


  render();
}

// ── Start ─────────────────────────────────────────────────────
document.getElementById('sb')?.addEventListener('click',connect);
document.getElementById('respawnBtn')?.addEventListener('click',()=>{
  if(socket&&socket.connected){
    socket.emit('join',{name:myName,color:myColor,flag:myFlag});
    // dead screen hidden by init handler after server confirms new player
  }
});
document.querySelector('#lobby')?.addEventListener('keydown',e=>{if(e.key==='Enter')connect();});
loop();

</script>
