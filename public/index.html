        function joinGame(name, flag, color) {
            myName = name; myFlag = flag; myColor = color;
            if (socket) socket.disconnect();

        function render() {

            if (foodDirty) {
                FCTX.clearRect(0, 0, 10000, 10000);
                food.forEach(f => {
                    FCTX.fillStyle = f.col;
                    FCTX.beginPath(); FCTX.arc(f.x, f.y, f.r, 0, Math.PI * 2); FCTX.fill();
                });
                foodDirty = false;
            }
            CTX.drawImage(FOOD_CANVAS, 0, 0);
