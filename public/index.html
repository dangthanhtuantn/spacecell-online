<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;overflow:hidden;font-family:'Courier New',monospace;user-select:none;cursor:none;}
canvas{display:block;}
/* Lobby */
#lobby{position:fixed;inset:0;background:radial-gradient(ellipse at center,#001428,#000208);display:flex;align-items:center;justify-content:center;z-index:200;cursor:default;}
.lbox{background:rgba(0,18,45,0.97);border:1px solid rgba(0,180,255,0.4);border-radius:16px;padding:28px 36px;width:520px;max-height:90vh;overflow-y:auto;}
.lbox h1{color:#0cf;font-size:24px;letter-spacing:5px;text-align:center;margin-bottom:4px;}
.lbox .sub{color:rgba(0,180,255,0.4);font-size:10px;letter-spacing:3px;text-align:center;margin-bottom:20px;}
.lbox label{display:block;color:#7dd8f0;font-size:11px;letter-spacing:2px;margin-bottom:6px;font-weight:bold;}
.lbox input[type=text]{width:100%;background:rgba(0,25,60,0.8);border:1px solid rgba(0,180,255,0.3);border-radius:6px;color:#fff;font-family:inherit;font-size:14px;padding:8px 12px;margin-bottom:18px;outline:none;}
.lbox input:focus{border-color:#0cf;}
.lsec{margin-bottom:16px;}
.tabs{display:flex;margin-bottom:10px;border-bottom:1px solid rgba(0,180,255,0.2);}
.tab{flex:1;padding:7px;text-align:center;font-size:11px;letter-spacing:1px;color:#6ab8d4;cursor:pointer;font-weight:bold;}
.tab.on{color:#0cf;border-bottom:2px solid #0cf;}
.colors{display:flex;gap:8px;flex-wrap:wrap;}
.csw{width:28px;height:28px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:transform .15s;}
.csw:hover,.csw.sel{transform:scale(1.3);border-color:#fff;}
.fgrid{display:grid;grid-template-columns:repeat(8,1fr);gap:4px;max-height:200px;overflow-y:auto;padding:2px;}
.flag{font-size:22px;text-align:center;padding:3px 2px;border-radius:4px;cursor:pointer;border:2px solid transparent;line-height:1.2;color:#fff;}
.flag:hover,.flag.sel{border-color:#0cf;background:rgba(0,180,255,0.12);}
.playbtn{width:100%;background:rgba(0,180,255,0.15);border:1px solid rgba(0,180,255,0.6);color:#0cf;font-family:inherit;font-size:13px;letter-spacing:3px;padding:11px;border-radius:8px;cursor:pointer;margin-top:6px;}
.playbtn:hover{background:rgba(0,180,255,0.3);}
/* HUD */
#hud{position:fixed;top:10px;left:10px;pointer-events:none;display:flex;flex-direction:column;gap:5px;}
.hb{background:rgba(0,10,28,0.9);border:1px solid rgba(0,180,255,0.25);border-radius:8px;padding:6px 12px;min-width:145px;}
.hl{color:rgba(0,180,255,0.55);font-size:9px;letter-spacing:2px;margin-bottom:1px;}
.hv{font-size:15px;font-weight:bold;color:#fff;}
#lb{position:fixed;top:10px;right:10px;background:rgba(0,10,28,0.9);border:1px solid rgba(0,180,255,0.25);border-radius:8px;padding:7px 12px;pointer-events:none;min-width:140px;}
#lb h4{color:rgba(0,180,255,0.55);font-size:9px;letter-spacing:2px;margin-bottom:4px;}
.le{font-size:11px;color:#bbb;padding:1px 0;}.le.me{color:#0ff;font-weight:bold;}
/* Skill bar */
#inv{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);display:flex;gap:6px;pointer-events:none;}
.sk{background:rgba(0,10,28,0.93);border:1px solid rgba(0,180,255,0.32);border-radius:8px;padding:5px 9px;text-align:center;min-width:52px;}
.sk .k{font-size:12px;font-weight:bold;color:#0ff;}.sk .n{color:#444;font-size:8px;letter-spacing:1px;margin-top:1px;}
.sk .cnt{color:#ff0;font-size:11px;font-weight:bold;min-height:14px;}.sk .cd{color:#f80;font-size:9px;min-height:11px;}
.sk.act{border-color:#0ff;background:rgba(0,40,65,0.9);}.sk.emp .k{color:rgba(0,180,255,0.2);}.sk.fire{border-color:#f80;}
/* Minimap */
#mmw{position:fixed;bottom:14px;right:14px;pointer-events:none;}
#mmw .mml{color:rgba(0,180,255,0.45);font-size:9px;letter-spacing:1px;text-align:center;margin-bottom:3px;}
#mm{border:1px solid rgba(0,180,255,0.35);border-radius:6px;display:block;}
/* Ping */
#pingbar{position:fixed;top:10px;left:50%;transform:translateX(-50%);background:rgba(0,10,28,0.85);border:1px solid rgba(0,180,255,0.2);border-radius:20px;padding:4px 14px;font-size:10px;color:rgba(0,180,255,0.6);pointer-events:none;}
/* Messages */
#msgs{position:fixed;top:40px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;gap:3px;pointer-events:none;align-items:center;z-index:50;}
.msg{background:rgba(0,10,28,0.93);border-left:3px solid #0cf;padding:3px 12px;font-size:11px;color:#ccc;border-radius:0 4px 4px 0;transition:opacity .5s;white-space:nowrap;}
/* Dead screen */
#dead{position:fixed;inset:0;background:rgba(0,0,0,0.85);display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:99;cursor:default;}
#dead h2{color:#f44;font-size:28px;letter-spacing:4px;}
#dead p{color:#aaa;font-size:13px;}
#dead button{background:rgba(0,180,255,0.2);border:1px solid rgba(0,180,255,0.6);color:#0cf;font-family:inherit;font-size:13px;padding:10px 26px;border-radius:6px;cursor:pointer;letter-spacing:2px;}

<script src="/socket.io/socket.io.js"></script>
<script>
// ── Lobby ──────────────────────────────────────────────────────
const PCOLORS=['#00cfff','#ff4455','#ffaa00','#44ff88','#ff44ff','#ffff44','#ff8800','#00ffcc','#ff88cc','#88ff44','#4488ff','#ff6644'];
const ALL_FLAGS=['🇦🇩','🇦🇪','🇦🇫','🇦🇬','🇦🇱','🇦🇲','🇦🇴','🇦🇷','🇦🇹','🇦🇺','🇦🇿','🇧🇦','🇧🇧','🇧🇩','🇧🇪','🇧🇫','🇧🇬','🇧🇭','🇧🇮','🇧🇯','🇧🇳','🇧🇴','🇧🇷','🇧🇸','🇧🇹','🇧🇼','🇧🇾','🇧🇿','🇨🇦','🇨🇩','🇨🇫','🇨🇬','🇨🇭','🇨🇱','🇨🇲','🇨🇳','🇨🇴','🇨🇷','🇨🇺','🇨🇻','🇨🇾','🇨🇿','🇩🇪','🇩🇯','🇩🇰','🇩🇲','🇩🇴','🇩🇿','🇪🇨','🇪🇪','🇪🇬','🇪🇷','🇪🇸','🇪🇹','🇫🇮','🇫🇯','🇫🇲','🇫🇷','🇬🇦','🇬🇧','🇬🇩','🇬🇪','🇬🇭','🇬🇲','🇬🇳','🇬🇶','🇬🇷','🇬🇹','🇬🇼','🇬🇾','🇭🇳','🇭🇷','🇭🇹','🇭🇺','🇮🇩','🇮🇪','🇮🇱','🇮🇳','🇮🇶','🇮🇷','🇮🇸','🇮🇹','🇯🇲','🇯🇴','🇯🇵','🇰🇪','🇰🇬','🇰🇭','🇰🇮','🇰🇲','🇰🇳','🇰🇵','🇰🇷','🇰🇼','🇰🇿','🇱🇦','🇱🇧','🇱🇨','🇱🇮','🇱🇰','🇱🇷','🇱🇸','🇱🇹','🇱🇺','🇱🇻','🇱🇾','🇲🇦','🇲🇨','🇲🇩','🇲🇪','🇲🇬','🇲🇭','🇲🇰','🇲🇱','🇲🇲','🇲🇳','🇲🇴','🇲🇷','🇲🇹','🇲🇺','🇲🇻','🇲🇼','🇲🇽','🇲🇾','🇲🇿','🇳🇦','🇳🇪','🇳🇬','🇳🇮','🇳🇱','🇳🇴','🇳🇵','🇳🇷','🇳🇿','🇴🇲','🇵🇦','🇵🇪','🇵🇬','🇵🇭','🇵🇰','🇵🇱','🇵🇸','🇵🇹','🇵🇼','🇵🇾','🇶🇦','🇷🇴','🇷🇸','🇷🇺','🇷🇼','🇸🇦','🇸🇧','🇸🇩','🇸🇪','🇸🇬','🇸🇮','🇸🇰','🇸🇱','🇸🇲','🇸🇳','🇸🇴','🇸🇷','🇸🇸','🇸🇹','🇸🇻','🇸🇾','🇸🇿','🇹🇩','🇹🇬','🇹🇭','🇹🇯','🇹🇱','🇹🇲','🇹🇳','🇹🇴','🇹🇹','🇹🇻','🇹🇼','🇹🇿','🇺🇦','🇺🇬','🇺🇸','🇺🇾','🇺🇿','🇻🇦','🇻🇨','🇻🇪','🇻🇳','🇻🇺','🇼🇸','🇽🇰','🇾🇪','🇿🇦','🇿🇲','🇿🇼'];

let selColor=PCOLORS[0],selFlag=null,useFlag=false;

function buildLobby(){
  const cg=document.getElementById('colorGrid');
  PCOLORS.forEach((c,i)=>{
    const d=document.createElement('div');d.className='csw'+(i===0?' sel':'');d.style.background=c;
    d.onclick=()=>{selColor=c;selFlag=null;useFlag=false;document.querySelectorAll('.csw').forEach(x=>x.classList.remove('sel'));d.classList.add('sel');};
    cg.appendChild(d);
  });
  const fg=document.getElementById('flagGrid');
  ALL_FLAGS.forEach(f=>{
    const d=document.createElement('div');d.className='flag';d.textContent=f;
    d.onclick=()=>{selFlag=f;useFlag=true;document.querySelectorAll('.flag').forEach(x=>x.classList.remove('sel'));d.classList.add('sel');};
    fg.appendChild(d);
  });
}
function switchTab(i){
  document.getElementById('panel0').style.display=i===0?'':'none';
  document.getElementById('panel1').style.display=i===1?'':'none';
  document.getElementById('tab0').className='tab'+(i===0?' on':'');
  document.getElementById('tab1').className='tab'+(i===1?' on':'');
}
function openLobby(){
  document.getElementById('dead').style.display='none';
  document.getElementById('lobby').style.display='flex';
  try{(adsbygoogle=window.adsbygoogle||[]).push({});}catch(e){}
}
function startFromLobby(){
  const name=document.getElementById('pname').value.trim()||'Player';
  document.getElementById('lobby').style.display='none';
  joinGame(name,useFlag?selFlag:null,selColor);
}
buildLobby();
document.getElementById('pname').addEventListener('keydown',e=>{if(e.key==='Enter')startFromLobby();});
document.getElementById('respawnBtn').onclick=()=>{
  document.getElementById('dead').style.display='none';
  openLobby();
};

// ── Engine ─────────────────────────────────────────────────────
const GC=document.getElementById('gc'),CTX=GC.getContext('2d');
const MMC=document.getElementById('mm'),MCTX=MMC.getContext('2d');
let SW,SH;
function resize(){SW=GC.width=window.innerWidth;SH=GC.height=window.innerHeight;}
resize();window.addEventListener('resize',resize);

const Mouse={x:0,y:0};
const Keys={};
window.addEventListener('mousemove',e=>{Mouse.x=e.clientX;Mouse.y=e.clientY;});
window.addEventListener('keydown',e=>{
  if(Keys[e.code])return;Keys[e.code]=true;
  if(e.code==='Space')e.preventDefault();
  if(gameActive)handleKey(e.code);
});
window.addEventListener('keyup',e=>{Keys[e.code]=false;});

const rnd=(a,b)=>Math.random()*(b-a)+a;
const mtr=m=>Math.sqrt(m)*1.5+3;
const clamp=(v,a,b)=>v<a?a:v>b?b:v;
function speedMult(mass){
  if(mass>=10000)return Math.pow(0.9,5);if(mass>=5000)return Math.pow(0.9,4);
  if(mass>=2000)return Math.pow(0.9,3);if(mass>=1000)return Math.pow(0.9,2);
  if(mass>=500)return Math.pow(0.9,1);return 1;
}

// Game state with interpolation + client-side prediction
let socket=null,myId=null,myName='Player',myColor='#00cfff',myFlag=null;
let GW=10000,GH=10000,CELL=1000,GRID=10;
// Ring buffer of snapshots (receive timestamps, no clock sync needed)
const SNAP_BUF=8;
const snapBuf=Array.from({length:SNAP_BUF},()=>({players:[],bots:[],bullets:[],t:Date.now()}));
let snapHead=0;
let snapCount=0;
let gameState={players:[],bots:[],bullets:[]};
let food=[],items=[],parts=[];
let localBullets=[]; // client-predicted bullets (immediate visual)
let camX=0,camY=0,camTargX=0,camTargY=0,pingTime=0;
let gameActive=false;
const STARS=[];
// 200ms delay: enough buffer for ping~150ms + jitter + 2 ticks
// t will almost always be in [0,1] -> no extrapolation -> no giật
const INTERP_DELAY=200;

// Client-side prediction for OWN player
let predX=0,predY=0,predMass=20,predVx=0,predVy=0;
let predDashFrames=0;

function initStars(){
  STARS.length=0;
  for(let i=0;i<800;i++)STARS.push({x:rnd(0,GW),y:rnd(0,GH),s:rnd(0.4,2.2),b:rnd(0.2,0.9)});
}

// ── Socket + game start ────────────────────────────────────────
function joinGame(name,flag,color){
  myName=name;myFlag=flag;myColor=color;
  if(socket){socket.disconnect();}
  socket=io();

  socket.on('connect',()=>{
    myId=socket.id;
    socket.emit('join',{name,color,flag});
    doPing(); // start ping loop
  });

  socket.on('init',d=>{
    GW=d.worldW;GH=d.worldH;
    food=d.food||[];items=d.items||[];
    gameState={players:[],bots:d.bots||[],bullets:[]};
    // Reset ring buffer
    snapHead=0;snapCount=0;
    localBullets=[];
    for(let i=0;i<SNAP_BUF;i++) snapBuf[i]={players:[],bots:d.bots||[],bullets:[],t:Date.now()};
    initStars();
    predX=d.spawnX||GW/2;predY=d.spawnY||GH/2;
    predMass=20;predVx=0;predVy=0;predDashFrames=0;
    camX=predX-SW/2;camY=predY-SH/2;
    camTargX=camX;camTargY=camY;
    gameActive=true;
    addMsg('Welcome '+name+'! Q Dash  W Shield  E Shoot  R Stealth  B Bomb  F Magnet','#0ff');
  });

  socket.on('state',s=>{
    // Expand compact keys from server
    const players=(s.p||[]).map(p=>({id:p.i,name:p.n,color:p.c,flag:p.f,x:p.x,y:p.y,mass:p.m,shielded:!!p.sh,stealthed:!!p.st,inv:p.inv,cdQ:p.cQ,cdW:p.cW,cdR:p.cR,cdB:p.cB,cdF:p.cF}));
    const bots=(s.b||[]).map(b=>({id:b.i,x:b.x,y:b.y,mass:b.m,col:b.c,name:b.n}));
    const bullets=(s.u||[]).map(b=>({id:b.i,x:b.x,y:b.y,r:b.r,col:b.c,type:b.t?'bomb':'shot'}));
    // Push into ring buffer with receive timestamp
    snapHead=(snapHead+1)%SNAP_BUF;
    snapBuf[snapHead]={players,bots,bullets,t:Date.now()};
    if(snapCount<SNAP_BUF)snapCount++;
    gameState={players,bots,bullets};
    // Reconcile prediction with server
    const me=s.players&&s.players.find(p=>p.id===myId);
    if(me){
      const err=Math.hypot(predX-me.x,predY-me.y);
      if(err>150){predX=me.x;predY=me.y;predVx=0;predVy=0;}
      else if(err>40){predX+=(me.x-predX)*0.04;predY+=(me.y-predY)*0.04;}
      predMass=me.mass;
    }
    updateHUD();
  });

  // Food and items update every 500ms
  socket.on('worldUpdate',d=>{
    if(d.food&&d.food.length){food=d.food;} // new array has no _hidden flags
    if(d.items&&d.items.length)items=d.items;
  });

  // Item removed instantly — don't wait for next worldUpdate
  socket.on('itemRemoved',id=>{
    const idx=items.findIndex(it=>it.id===id);
    if(idx!==-1)items.splice(idx,1);
  });

  // Food eaten instantly — replace eaten food with new food position
  socket.on('foodEaten',d=>{
    if(food[d.ni]){food[d.ni]=d.nf;food[d.ni]._hidden=false;}
  });

  socket.on('playerList',list=>{
    document.getElementById('lbr').innerHTML=list.slice(0,8).map((e,i)=>
      `<div class="le${e.id===myId?' me':''}">${i+1}. ${e.name} ${e.mass}</div>`
    ).join('');
  });

  socket.on('explode',({x,y,col})=>{
    // Delay matches interpolation offset so explosion aligns with displayed bot
    // ping ~150ms, interp 130ms, explosion arrives at ping after server event
    // net offset ≈ interp_delay - ping/2 = 130 - 75 = ~55ms
    setTimeout(()=>spark(x,y,col,30), 55);
  });
  socket.on('msg',({text,col})=>addMsg(text,col));

  socket.on('died',({by})=>{
    document.getElementById('dm').textContent='Absorbed by '+by+'!';
    document.getElementById('dead').style.display='flex';
    try{(adsbygoogle=window.adsbygoogle||[]).push({});}catch(e){}
  });

  socket.on('respawn',()=>{
    document.getElementById('dead').style.display='none';
    addMsg('Respawned!','#0ff');
  });

  socket.on('pong_reply',({t:serverT})=>{
    const rtt=Date.now()-pingTime;
    document.getElementById('pingval').textContent=rtt;
    setTimeout(doPing,2000);
  });

  socket.on('disconnect',()=>{gameActive=false;});
}

function doPing(){
  if(!socket||!socket.connected)return;
  pingTime=Date.now();socket.emit('ping');
  setTimeout(()=>{if(Date.now()-pingTime>1999)document.getElementById('pingval').textContent='--';},2000);
}

// ── Input ──────────────────────────────────────────────────────
function handleKey(code){
  if(!socket||!myId)return;
  const me=gameState.players.find(p=>p.id===myId);if(!me)return;
  const mdx=Mouse.x-SW/2,mdy=Mouse.y-SH/2,ml=Math.hypot(mdx,mdy)||1;
  if(code==='KeyQ'){
    if(!me.inv||me.inv.dash<=0||me.cdQ>0)return; // check before predicting
    socket.emit('dash',{nx:mdx/ml,ny:mdy/ml});
    // Predict dash instantly on client
    predVx=mdx/ml*40;predVy=mdy/ml*40;predDashFrames=12;
  }
  if(code==='KeyW')socket.emit('shield');
  if(code==='KeyR')socket.emit('stealth');
  if(code==='KeyB'){
    const wx=Mouse.x+camX,wy=Mouse.y+camY,dx=wx-predX,dy=wy-predY,l=Math.hypot(dx,dy)||1;
    socket.emit('bomb',{nx:dx/l,ny:dy/l});
  }
  if(code==='KeyF')socket.emit('magnet');
}

// Send movement input + predicted position to server ~30fps
setInterval(()=>{
  if(!socket||!myId||!gameActive)return;
  const mdx=Mouse.x-SW/2,mdy=Mouse.y-SH/2,ml=Math.hypot(mdx,mdy)||1;
  socket.emit('input',{
    vx:ml>5?mdx/ml:0,
    vy:ml>5?mdy/ml:0,
    px:Math.round(predX),  // predicted position for server reconciliation
    py:Math.round(predY)
  });
},33);

// Send shoot every server tick (33ms) for immediate response
let _lastLocalShot=0;
setInterval(()=>{
  if(!socket||!myId||!gameActive||!Keys['KeyE'])return;
  const me=gameState.players.find(p=>p.id===myId);if(!me||me.mass<=20)return;
  const wx=Mouse.x+camX,wy=Mouse.y+camY;
  const dx=wx-predX,dy=wy-predY,l=Math.hypot(dx,dy)||1;
  const nx=dx/l,ny=dy/l;
  socket.emit('shoot',{nx,ny,px:Math.round(predX),py:Math.round(predY)});
  // Spawn local bullet immediately for zero-latency visual
  const now=Date.now();
  if(now-_lastLocalShot>=33){
    _lastLocalShot=now;
    const r=mtr(predMass);
    localBullets.push({x:predX+nx*r,y:predY+ny*r,vx:nx*20,vy:ny*20,
      r:3,col:myColor,life:20,t:now});
  }
},33);

// ── Helpers ────────────────────────────────────────────────────
function addMsg(t,col){
  const d=document.getElementById('msgs');
  const el=document.createElement('div');el.className='msg';
  if(col)el.style.borderLeftColor=col;
  el.textContent=t;d.appendChild(el);
  if(d.children.length>5)d.removeChild(d.children[0]);
  setTimeout(()=>{el.style.opacity='0';setTimeout(()=>el.remove(),500);},2500);
}
function spark(px,py,col,n=8){
  for(let i=0;i<n;i++){
    const a=rnd(0,Math.PI*2),s=rnd(2,10);
    parts.push({x:px,y:py,vx:Math.cos(a)*s,vy:Math.sin(a)*s,r:rnd(2,6),col,life:rnd(15,40)});
  }
}

// Linear interpolation
function lerp(a,b,t){return a+(b-a)*t;}
function slerp(a,b,t){const s=t*t*(3-2*t);return a+(b-a)*s;} // smoothstep - smooth joins

function getInterpolated(){
  if(snapCount<2){
    const s=snapBuf[snapHead];
    return {players:s.players,bots:s.bots,bullets:s.bullets};
  }

  const latestBullets=snapBuf[snapHead].bullets;

  // 130ms buffer: stable t even with 10-20ms packet timing variance
  const renderT=Date.now()-130;

  let prevIdx=-1,currIdx=-1;
  for(let i=0;i<snapCount;i++){
    const idx=(snapHead-i+SNAP_BUF)%SNAP_BUF;
    if(snapBuf[idx].t<=renderT){
      currIdx=(snapHead-(i-1)+SNAP_BUF)%SNAP_BUF;
      prevIdx=idx;
      break;
    }
  }
  if(prevIdx===-1){
    prevIdx=(snapHead-snapCount+1+SNAP_BUF)%SNAP_BUF;
    currIdx=(snapHead-snapCount+2+SNAP_BUF)%SNAP_BUF;
  }
  if(currIdx===-1||currIdx===prevIdx){
    currIdx=snapHead;
    prevIdx=(snapHead-1+SNAP_BUF)%SNAP_BUF;
  }

  const prev=snapBuf[prevIdx];
  const curr=snapBuf[currIdx];
  const dt=curr.t-prev.t;
  const t=dt<=0?1:Math.max(0,Math.min(1,(renderT-prev.t)/dt));

  const prevPlayerMap=new Map(prev.players.map(p=>[p.id,p]));
  const prevBotMap   =new Map(prev.bots.map(b=>[b.id,b]));

  const players=curr.players.map(c=>{
    const p=prevPlayerMap.get(c.id);
    if(!p)return c;
    return {...c,x:slerp(p.x,c.x,t),y:slerp(p.y,c.y,t)};
  });

  const bots=curr.bots.map(c=>{
    const p=prevBotMap.get(c.id);
    if(!p)return c;
    return {...c,x:slerp(p.x,c.x,t),y:slerp(p.y,c.y,t)};
  });

  return {players,bots,bullets:latestBullets};
}

// ── HUD ────────────────────────────────────────────────────────
function updateHUD(){
  const me=(gameState.players||[]).find(p=>p.id===myId);if(!me)return;
  document.getElementById('hm').textContent=Math.floor(me.mass)+' M';
  document.getElementById('hs').textContent=Math.round(speedMult(me.mass)*100)+'%';
  const all=[...(gameState.players||[]),...(gameState.bots||[])].map(p=>p.mass).sort((a,b)=>b-a);
  document.getElementById('hr').textContent='#'+(all.findIndex(m=>m===me.mass)+1);
  if(me.inv){
    updSk('Q',me.inv.dash,me.cdQ,false,false);
    updSk('W',me.inv.shield,me.cdW,me.shielded,false);
    updSk('E',-1,0,false,true);
    updSk('R',me.inv.stealth,me.cdR,me.stealthed,false);
    updSk('B',me.inv.bomb,me.cdB,false,false);
    updSk('F',me.inv.magnet,me.cdF,false,false);
  }
  // Smooth camera: follow my interpolated position
  camTargX=me.x-SW/2; camTargY=me.y-SH/2;
}
function updSk(key,count,cd,active,isFire){
  const box=document.getElementById('sk'+key);
  const cnt=document.getElementById('cnt'+key);
  const cde=document.getElementById('cd'+key);
  if(!box||!cnt||!cde)return;
  if(isFire){cnt.textContent=Keys['KeyE']?'firing':'hold';cde.textContent='';box.className='sk'+(Keys['KeyE']?' fire':'');return;}
  cnt.textContent=count>=0?count:'';
  cde.textContent=cd>0?(cd/1000).toFixed(1)+'s':'';
  box.className='sk'+(active?' act':count===0?' emp':'');
}

// ── Render loop ────────────────────────────────────────────────
let prev=0;
function loop(ts){
  requestAnimationFrame(loop);
  const dt=Math.min((ts-prev)/16.67,3);prev=ts;

  // CLIENT-SIDE PREDICTION: frame-rate independent physics matching server
  if(gameActive&&myId){
    const me=gameState.players&&gameState.players.find(p=>p.id===myId);
    const spd=me?6*speedMult(me.mass||predMass):6; // match server baseSpd=6
    const tickFrac=dt*16.67/33;
    const lP=1-Math.pow(1-0.25,tickFrac);  // match server LERP_P=0.25
    const fr=Math.pow(0.85,tickFrac);       // match server FRIC=0.85
    if(predDashFrames>0){predDashFrames--;predVx*=fr;predVy*=fr;}
    else{
      const mdx=Mouse.x-SW/2,mdy=Mouse.y-SH/2,ml=Math.hypot(mdx,mdy)||1;
      predVx+=(mdx/ml*spd-predVx)*lP;predVy+=(mdy/ml*spd-predVy)*lP;
      predVx*=fr;predVy*=fr;
    }
    const pr=me?mtr(me.mass||predMass):mtr(predMass);
    predX=Math.max(pr,Math.min(GW-pr,predX+predVx*dt));
    predY=Math.max(pr,Math.min(GH-pr,predY+predVy*dt));
    camTargX=predX-SW/2;camTargY=predY-SH/2;

    // Client-side food hiding: immediately hide food predX overlaps
    // Server confirms via foodEaten; this removes visual lag
    if(food.length){
      const eatR=pr+15;const eatR2=eatR*eatR;
      for(let i=food.length-1;i>=0;i--){
        const f=food[i];
        if(!f||!f._visible)continue; // already hidden
        const dx=predX-f.x,dy=predY-f.y;
        if(predMass>f.mass&&dx*dx+dy*dy<eatR2){
          f._hidden=true; // hide locally, server will confirm
        }
      }
    }
    // Update predMass from server
    if(me)predMass=me.mass;
  }

  // Smooth camera
  camX+=(camTargX-camX)*0.18;
  camY+=(camTargY-camY)*0.18;

  // Particles
  for(let i=parts.length-1;i>=0;i--){
    const p=parts[i];p.x+=p.vx*dt;p.y+=p.vy*dt;p.vx*=0.92;p.vy*=0.92;p.life-=dt;p.r*=0.95;
    if(p.life<=0||p.r<0.3)parts.splice(i,1);
  }
  // Update local predicted bullets
  for(let i=localBullets.length-1;i>=0;i--){
    const b=localBullets[i];
    b.x+=b.vx*dt;b.y+=b.vy*dt;b.life-=dt;
    if(b.life<=0)localBullets.splice(i,1);
  }
  render();
}
requestAnimationFrame(loop);

// ── Render ─────────────────────────────────────────────────────
function render(){
  // Always draw background
  CTX.fillStyle='#000510';CTX.fillRect(0,0,SW,SH);

  if(!gameActive||!myId){
    renderMinimap();return;
  }

  // Get interpolated state for smooth rendering (others)
  const interp=getInterpolated();
  // For self: use predicted position (instant, no lag)
  const me=gameState.players&&gameState.players.find(p=>p.id===myId);

  CTX.save();CTX.translate(-camX,-camY);

  // Stars
  CTX.fillStyle='#fff';
  STARS.forEach(s=>{
    if(s.x<camX-5||s.x>camX+SW+5||s.y<camY-5||s.y>camY+SH+5)return;
    CTX.globalAlpha=s.b;CTX.beginPath();CTX.arc(s.x,s.y,s.s,0,Math.PI*2);CTX.fill();
  });
  CTX.globalAlpha=1;

  // Grid
  CTX.strokeStyle='rgba(0,55,120,0.2)';CTX.lineWidth=1;
  const gx0=Math.floor(camX/CELL)*CELL,gy0=Math.floor(camY/CELL)*CELL;
  for(let gx=gx0;gx<camX+SW+CELL;gx+=CELL){CTX.beginPath();CTX.moveTo(gx,0);CTX.lineTo(gx,GH);CTX.stroke();}
  for(let gy=gy0;gy<camY+SH+CELL;gy+=CELL){CTX.beginPath();CTX.moveTo(0,gy);CTX.lineTo(GW,gy);CTX.stroke();}
  CTX.strokeStyle='rgba(0,160,255,0.7)';CTX.lineWidth=6;CTX.strokeRect(0,0,GW,GH);

  // Food
  food.forEach(f=>{
    if(f._hidden)return; // client-side hidden (eaten prediction)
    if(f.x<camX-20||f.x>camX+SW+20||f.y<camY-20||f.y>camY+SH+20)return;
    CTX.fillStyle=f.col;CTX.beginPath();CTX.arc(f.x,f.y,f.r,0,Math.PI*2);CTX.fill();
  });

  // Items
  items.forEach(it=>{
    if(it.x<camX-50||it.x>camX+SW+50||it.y<camY-50||it.y>camY+SH+50)return;
    if(!it._age)it._age=0;it._age++;
    const pulse=Math.sin(it._age*0.06)*0.28+0.72;
    CTX.globalAlpha=pulse*0.35;CTX.fillStyle=it.col;CTX.beginPath();CTX.arc(it.x,it.y,it.r+8,0,Math.PI*2);CTX.fill();
    CTX.globalAlpha=1;CTX.fillStyle=it.col;CTX.beginPath();CTX.arc(it.x,it.y,it.r,0,Math.PI*2);CTX.fill();
    const lbl=it.label||it.type;
    CTX.font='bold 9px monospace';CTX.textAlign='center';CTX.textBaseline='middle';
    const tw=CTX.measureText(lbl).width;
    CTX.fillStyle='rgba(0,0,0,0.72)';CTX.fillRect(it.x-tw/2-2,it.y-5,tw+4,10);
    CTX.fillStyle='#fff';CTX.fillText(lbl,it.x,it.y+1);
  });

  // Particles
  parts.forEach(p=>{CTX.globalAlpha=Math.min(1,p.life/20);CTX.fillStyle=p.col;CTX.beginPath();CTX.arc(p.x,p.y,p.r,0,Math.PI*2);CTX.fill();});
  CTX.globalAlpha=1;

  // Local predicted bullets (zero latency - rendered immediately when shot)
  localBullets.forEach(b=>{
    CTX.fillStyle=b.col;CTX.shadowBlur=5;CTX.shadowColor=b.col;
    CTX.beginPath();CTX.arc(b.x,b.y,b.r,0,Math.PI*2);CTX.fill();CTX.shadowBlur=0;
  });

  // Server bullets (others' bullets only - skip own since localBullets covers them)
  (interp.bullets||[]).forEach(b=>{
    if(b.col===myColor)return; // own bullet already shown via localBullets
    CTX.fillStyle=b.col;CTX.shadowBlur=b.type==='bomb'?16:5;CTX.shadowColor=b.col;
    CTX.beginPath();CTX.arc(b.x,b.y,b.r,0,Math.PI*2);CTX.fill();CTX.shadowBlur=0;
  });

  // Bots (interpolated)
  (interp.bots||[]).forEach(b=>drawBot(b));

  // Other players (interpolated)
  (interp.players||[]).forEach(p=>{
    if(p.id===myId)return; // skip self, drawn below
    drawOther(p);
  });
  // Self at predicted position (no network lag)
  if(me){
    const predMe={...me,x:predX,y:predY};
    drawMe(predMe);
  }

  CTX.restore();

  // Crosshair (screen space)
  CTX.strokeStyle='rgba(0,220,255,0.85)';CTX.lineWidth=1.5;
  CTX.beginPath();CTX.arc(Mouse.x,Mouse.y,9,0,Math.PI*2);CTX.stroke();
  [[0,-16,0,-5],[0,5,0,16],[-16,0,-5,0],[5,0,16,0]].forEach(([x1,y1,x2,y2])=>{
    CTX.beginPath();CTX.moveTo(Mouse.x+x1,Mouse.y+y1);CTX.lineTo(Mouse.x+x2,Mouse.y+y2);CTX.stroke();
  });

  renderMinimap();
}

function drawMe(p){
  const r=mtr(p.mass);
  CTX.globalAlpha=p.stealthed?0.45:1;
  if(myFlag){
    CTX.fillStyle=myColor+'88';CTX.beginPath();CTX.arc(p.x,p.y,r,0,Math.PI*2);CTX.fill();
    CTX.save();CTX.beginPath();CTX.arc(p.x,p.y,r,0,Math.PI*2);CTX.clip();
    CTX.font=`${clamp(r*1.1,12,50)}px serif`;CTX.textAlign='center';CTX.textBaseline='middle';CTX.fillText(myFlag,p.x,p.y);
    CTX.restore();
  } else {
    CTX.fillStyle=myColor;CTX.beginPath();CTX.arc(p.x,p.y,r,0,Math.PI*2);CTX.fill();
  }
  CTX.globalAlpha=p.stealthed?0.3:0.9;
  CTX.strokeStyle=myColor;CTX.lineWidth=2.5;CTX.beginPath();CTX.arc(p.x,p.y,r,0,Math.PI*2);CTX.stroke();
  if(p.shielded){
    CTX.strokeStyle='rgba(180,180,255,0.9)';CTX.lineWidth=3;CTX.setLineDash([8,5]);
    CTX.beginPath();CTX.arc(p.x,p.y,r+12,0,Math.PI*2);CTX.stroke();CTX.setLineDash([]);
  }
  CTX.globalAlpha=1;
  if(r>10){
    CTX.shadowBlur=3;CTX.shadowColor='#000';
    CTX.fillStyle='#fff';CTX.font=`bold ${clamp(r*0.3,9,15)}px monospace`;
    CTX.textAlign='center';CTX.textBaseline='middle';
    CTX.fillText(myName,p.x,p.y-r*0.18);
    CTX.font=`${clamp(r*0.25,8,12)}px monospace`;CTX.fillStyle='rgba(255,255,255,0.7)';
    CTX.fillText(Math.floor(p.mass)+'M',p.x,p.y+r*0.26);CTX.shadowBlur=0;
  }
}

function drawOther(p){
  const r=mtr(p.mass);
  if(p.stealthed){
    CTX.globalAlpha=0.15;
    CTX.fillStyle=p.color;CTX.beginPath();CTX.arc(p.x,p.y,r,0,Math.PI*2);CTX.fill();
    CTX.strokeStyle=p.color;CTX.lineWidth=1;CTX.setLineDash([4,6]);
    CTX.beginPath();CTX.arc(p.x,p.y,r,0,Math.PI*2);CTX.stroke();
    CTX.setLineDash([]);CTX.globalAlpha=1;return;
  }
  CTX.globalAlpha=0.9;
  if(p.flag){
    CTX.fillStyle=p.color+'88';CTX.beginPath();CTX.arc(p.x,p.y,r,0,Math.PI*2);CTX.fill();
    CTX.save();CTX.beginPath();CTX.arc(p.x,p.y,r,0,Math.PI*2);CTX.clip();
    CTX.font=`${clamp(r*1.1,12,50)}px serif`;CTX.textAlign='center';CTX.textBaseline='middle';
    CTX.globalAlpha=0.9;CTX.fillText(p.flag,p.x,p.y);CTX.restore();
  } else {
    CTX.fillStyle=p.color;CTX.beginPath();CTX.arc(p.x,p.y,r,0,Math.PI*2);CTX.fill();
  }
  CTX.strokeStyle=p.color;CTX.lineWidth=1.5;CTX.globalAlpha=0.9;CTX.beginPath();CTX.arc(p.x,p.y,r,0,Math.PI*2);CTX.stroke();
  if(p.shielded){
    CTX.strokeStyle='rgba(180,180,255,0.8)';CTX.lineWidth=2;CTX.setLineDash([6,4]);
    CTX.beginPath();CTX.arc(p.x,p.y,r+10,0,Math.PI*2);CTX.stroke();CTX.setLineDash([]);
  }
  CTX.globalAlpha=1;
  if(r>8){
    CTX.fillStyle='#fff';CTX.font=`bold ${clamp(r*0.3,8,13)}px monospace`;
    CTX.textAlign='center';CTX.textBaseline='middle';CTX.shadowBlur=2;CTX.shadowColor='#000';
    CTX.fillText(p.name,p.x,p.y-r*0.16);
    CTX.fillStyle='rgba(255,255,255,0.6)';CTX.font=`${clamp(r*0.25,7,11)}px monospace`;
    CTX.fillText(Math.floor(p.mass)+'M',p.x,p.y+r*0.26);CTX.shadowBlur=0;
  }
}

function drawBot(b){
  const r=mtr(b.mass);
  CTX.fillStyle=b.col;CTX.globalAlpha=0.85;CTX.beginPath();CTX.arc(b.x,b.y,r,0,Math.PI*2);CTX.fill();
  CTX.strokeStyle=b.col;CTX.lineWidth=1.2;CTX.globalAlpha=1;CTX.stroke();
  if(r>8){
    CTX.fillStyle='#fff';CTX.font=`bold ${clamp(r*0.3,7,13)}px monospace`;
    CTX.textAlign='center';CTX.textBaseline='middle';CTX.shadowBlur=2;CTX.shadowColor='#000';
    CTX.fillText(b.name,b.x,b.y-r*0.16);
    CTX.fillStyle='rgba(255,255,255,0.6)';CTX.font=`${clamp(r*0.24,6,11)}px monospace`;
    CTX.fillText(Math.floor(b.mass)+'M',b.x,b.y+r*0.26);CTX.shadowBlur=0;
  }
}

function renderMinimap(){
  const MS=130;
  MCTX.fillStyle='rgba(0,4,16,0.96)';MCTX.fillRect(0,0,MS,MS);
  const sx=MS/GW,sy=MS/GH;
  MCTX.strokeStyle='rgba(0,70,160,0.2)';MCTX.lineWidth=0.5;
  for(let g=0;g<=GRID;g++){
    MCTX.beginPath();MCTX.moveTo(g*CELL*sx,0);MCTX.lineTo(g*CELL*sx,MS);MCTX.stroke();
    MCTX.beginPath();MCTX.moveTo(0,g*CELL*sy);MCTX.lineTo(MS,g*CELL*sy);MCTX.stroke();
  }
  // Only show self on minimap (use latest position, not interpolated)
  const meLatest=gameState.players&&gameState.players.find(p=>p.id===myId);
  if(meLatest){
    MCTX.shadowBlur=8;MCTX.shadowColor='#0ff';MCTX.fillStyle='#0ff';
    const pr=Math.max(3,mtr(meLatest.mass)*sx*5);
    MCTX.beginPath();MCTX.arc(meLatest.x*sx,meLatest.y*sy,pr,0,Math.PI*2);MCTX.fill();
    MCTX.shadowBlur=0;
    MCTX.strokeStyle='rgba(0,200,255,0.5)';MCTX.lineWidth=1;
    MCTX.strokeRect(camX*sx,camY*sy,SW*sx,SH*sy);
  }
  MCTX.strokeStyle='rgba(0,160,255,0.4)';MCTX.lineWidth=1;MCTX.strokeRect(0,0,MS,MS);
}
